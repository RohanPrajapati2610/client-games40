<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Right and Left · LY3</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', 'Trebuchet MS', Arial, sans-serif;
      background: linear-gradient(160deg, #87CEEB, #B0E2FF, #FFD6E8, #C8F0C8);
      background-size: 300% 300%;
      animation: skyShift 14s ease-in-out infinite alternate;
      height: 100vh; height: 100dvh;
      display: flex; align-items: stretch; justify-content: center;
      overflow: hidden; user-select: none; -webkit-user-select: none;
    }
    @keyframes skyShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 60% 20%; }
      100% { background-position: 100% 50%; }
    }

    /* ── BACKGROUND SCENE ── */
    #bg-scene {
      position: fixed; inset: 0; z-index: 0;
      pointer-events: none; overflow: hidden;
    }
    #game-screen  { position: relative; z-index: 1; }
    #toast        { z-index: 100; }
    #end-screen   { z-index: 150; }
    #intro-screen { z-index: 200; }

    /* Rainbow */
    .bg-rainbow {
      position: absolute; top: -30px; left: 50%; transform: translateX(-50%);
      width: 110%; opacity: 0.35;
    }

    /* Sun */
    .bg-sun {
      position: absolute; top: 14px; left: 18px; width: 80px; height: 80px;
    }
    .sun-rays { animation: sunSpin 20s linear infinite; transform-origin: 40px 40px; }
    @keyframes sunSpin { to { transform: rotate(360deg); } }

    /* Clouds */
    .bg-cloud {
      position: absolute; opacity: 0.88;
      will-change: transform;
    }
    .bg-cloud svg { display: block; }
    .cloud1 { top: 8%;  animation: cloudDrift1 28s linear infinite; }
    .cloud2 { top: 18%; animation: cloudDrift2 38s linear infinite; }
    .cloud3 { top: 4%;  animation: cloudDrift3 46s linear infinite; }
    @keyframes cloudDrift1 { 0%{transform:translateX(110vw)} 100%{transform:translateX(-260px)} }
    @keyframes cloudDrift2 { 0%{transform:translateX(-240px)} 100%{transform:translateX(110vw)} }
    @keyframes cloudDrift3 { 0%{transform:translateX(70vw)} 100%{transform:translateX(-300px)} }

    /* Stars / sparkles */
    .bg-star {
      position: absolute; width: 14px; height: 14px;
      animation: starTwinkle 2.4s ease-in-out infinite;
      will-change: opacity, transform;
    }
    .bg-star::before {
      content: '✦'; font-size: 14px; color: rgba(255,220,50,0.85);
      position: absolute;
    }
    @keyframes starTwinkle {
      0%,100%{ opacity: 0.2; transform: scale(0.7); }
      50%    { opacity: 1;   transform: scale(1.2); }
    }
    .s1{top:10%;left:15%;animation-delay:0s}
    .s2{top:6%; left:55%;animation-delay:.8s}
    .s3{top:14%;left:80%;animation-delay:1.4s}
    .s4{top:22%;left:38%;animation-delay:.4s}
    .s5{top:8%; left:92%;animation-delay:2s}
    .s6{top:28%;left:72%;animation-delay:1.1s}

    /* Butterfly */
    .bg-butterfly {
      position: absolute; top: 20%;
      animation: bflyPath 18s ease-in-out infinite;
      will-change: transform;
    }
    .bg-butterfly svg { animation: bflyWing 0.5s ease-in-out infinite alternate; }
    @keyframes bflyPath {
      0%  { transform: translate(-60px, 0px); }
      25% { transform: translate(30vw, -60px); }
      50% { transform: translate(60vw, 20px); }
      75% { transform: translate(80vw, -40px); }
      100%{ transform: translate(110vw, 10px); }
    }
    @keyframes bflyWing { from{ transform: scaleY(1); } to{ transform: scaleY(0.5); } }

    /* Bee */
    .bg-bee {
      position: absolute; top: 35%; right: 8%;
      animation: beeBuzz 5s ease-in-out infinite;
      will-change: transform;
    }
    @keyframes beeBuzz {
      0%  { transform: translate(0,0) rotate(0deg); }
      20% { transform: translate(-18px,-22px) rotate(-15deg); }
      40% { transform: translate(14px,-36px) rotate(10deg); }
      60% { transform: translate(-10px,-12px) rotate(-8deg); }
      80% { transform: translate(20px,-28px) rotate(12deg); }
      100%{ transform: translate(0,0) rotate(0deg); }
    }

    /* Grass strip */
    .bg-grass {
      position: absolute; bottom: 0; left: 0; right: 0;
      height: 68px;
    }

    /* Flowers on grass */
    .bg-flower {
      position: absolute; bottom: 42px;
      animation: flowerSway 3.5s ease-in-out infinite;
      transform-origin: bottom center; will-change: transform;
    }
    @keyframes flowerSway {
      0%,100%{ transform: rotate(-4deg); }
      50%    { transform: rotate(4deg); }
    }
    .fl1{left:6%; animation-delay:0s}
    .fl2{left:18%;animation-delay:.5s}
    .fl3{left:32%;animation-delay:1s}
    .fl4{left:62%;animation-delay:.3s}
    .fl5{left:78%;animation-delay:.9s}
    .fl6{left:90%;animation-delay:1.5s}

    /* Side animals — desktop only */
    .bg-side-animal {
      position: fixed; bottom: 100px;
      animation: sideAnimalBob 3s ease-in-out infinite;
      will-change: transform;
    }
    .bg-side-left  { left: 0; }
    .bg-side-right { right: 0; }
    @keyframes sideAnimalBob {
      0%,100%{ transform: translateY(0); }
      50%    { transform: translateY(-14px); }
    }
    /* Only show on wide screens where there's space beside the card */
    @media (max-width: 960px) { .bg-side-animal { display: none; } }

    #intro-screen {
      position: fixed; inset: 0;
      background: linear-gradient(160deg, #4a148c, #7b1fa2, #ab47bc);
      display: flex; align-items: center; justify-content: center;
      border: 5px solid #FFD700; z-index: 200; cursor: pointer;
    }
    #intro-logo { width: 220px; height: auto; filter: drop-shadow(0 6px 20px rgba(0,0,0,0.5)); animation: logoBounce 2s ease-in-out infinite; }
    @keyframes logoBounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }

    #game-screen {
      display: none; flex-direction: column;
      width: 100%; max-width: 860px;
      height: 100%; padding: 14px 14px 80px; overflow-y: auto;
    }

    .hdr {
      display: flex; align-items: center; justify-content: space-between;
      background: white; border-radius: 18px; padding: 10px 18px;
      margin-bottom: 10px; box-shadow: 0 4px 14px rgba(0,0,0,0.1); flex-shrink: 0;
    }
    .hdr-score { font-size: 1.2em; font-weight: bold; color: #4CAF50; min-width: 70px; }
    .hdr-title { font-size: clamp(0.75em,2.5vw,1em); color: #6a0dad; font-weight: bold; text-align: center; }
    .mute-btn { width: 38px; height: 38px; border: 2px solid #ddd; border-radius: 50%; background: white; font-size: 1.1em; cursor: pointer; display: flex; align-items: center; justify-content: center; }

    .progress-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; flex-shrink: 0; }
    .progress-label { font-size: 0.9em; color: #777; white-space: nowrap; }
    .progress-bar-wrap { flex: 1; height: 10px; background: #e0e0e0; border-radius: 5px; overflow: hidden; }
    .progress-bar-fill { height: 100%; border-radius: 5px; background: linear-gradient(90deg, #4CAF50, #8BC34A); transition: width 0.5s ease; }

    .instruction {
      text-align: center; font-size: clamp(0.95em,3vw,1.15em);
      color: #333; font-weight: 700; margin-bottom: 10px;
      padding: 0 4px; flex-shrink: 0; line-height: 1.4;
    }

    .q-card {
      background: white; border-radius: 24px; padding: 20px 16px;
      box-shadow: 0 6px 24px rgba(0,0,0,0.1);
      display: flex; flex-direction: column; align-items: center; gap: 20px;
      margin-top: auto; margin-bottom: auto; flex-shrink: 0;
    }

    /* ── SCENE ── */
    .dir-scene {
      width: 100%; border-radius: 20px; overflow: hidden;
      border: 3px solid #e0e0e0;
      display: grid; grid-template-columns: 1fr 1fr;
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    .dir-scene.correct { border-color: #4CAF50; box-shadow: 0 0 0 4px #4CAF5040; }

    .dir-half {
      display: flex; flex-direction: column;
      align-items: center; justify-content: space-between;
      padding: 14px 10px 12px; min-height: 230px;
    }
    .dir-half.left-half  { background: linear-gradient(160deg, #e3f2fd, #bbdefb); border-right: 2px dashed #90caf9; }
    .dir-half.right-half { background: linear-gradient(160deg, #fce4ec, #f8bbd0); }

    .half-label {
      font-size: 1em; font-weight: 800; letter-spacing: 0.06em;
      display: flex; align-items: center; gap: 4px;
    }
    .left-half  .half-label { color: #1565c0; }
    .right-half .half-label { color: #880e4f; }

    .animal-wrap {
      flex: 1; display: flex; align-items: center; justify-content: center;
    }
    .animal-wrap svg { width: 160px; height: 160px; }

    .empty-slot {
      width: 120px; height: 120px; border-radius: 50%;
      border: 4px dashed rgba(0,0,0,0.12);
      display: flex; align-items: center; justify-content: center;
      font-size: 2.5em; color: rgba(0,0,0,0.1);
    }

    /* ── BUTTONS ── */
    .dir-choices { display: flex; gap: 16px; width: 100%; justify-content: center; }
    .dir-btn {
      flex: 1; max-width: 200px; height: 74px;
      border: 4px solid transparent; border-radius: 20px;
      display: flex; align-items: center; justify-content: center; gap: 6px;
      font-size: 1.5em; font-weight: 800; cursor: pointer;
      box-shadow: 0 4px 14px rgba(0,0,0,0.15);
      transition: transform 0.1s, border-color 0.2s, box-shadow 0.2s;
    }
    .dir-btn:active { transform: scale(0.93); }
    #btn-left  { background: linear-gradient(135deg, #1565c0, #1e88e5); color: white; }
    #btn-right { background: linear-gradient(135deg, #880e4f, #e91e63); color: white; }
    .dir-btn.correct { border-color: #4CAF50; box-shadow: 0 0 0 5px #4CAF5040; animation: popCorrect 0.35s ease; }
    .dir-btn.wrong   { border-color: #f44336; animation: shakeWrong 0.4s ease; }
    .dir-btn.hint    { border-color: #FFD700; animation: pulseHint 1s ease-in-out infinite; }

    @keyframes popCorrect { 0%{transform:scale(1)} 50%{transform:scale(1.08)} 100%{transform:scale(1)} }
    @keyframes shakeWrong { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }
    @keyframes pulseHint  { 0%,100%{box-shadow:0 0 0 0 rgba(255,215,0,0.6)} 50%{box-shadow:0 0 0 12px rgba(255,215,0,0)} }

    .btn-restart {
      position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
      background: linear-gradient(135deg,#FF9800,#F57C00);
      color: white; border: none; border-radius: 50px;
      padding: 14px 36px; font-size: 1.05em; font-family: inherit;
      font-weight: 800; cursor: pointer;
      box-shadow: 0 4px 16px rgba(255,152,0,0.4); z-index: 50; white-space: nowrap;
    }

    #toast {
      position: fixed; top: 20%; left: 50%;
      transform: translateX(-50%) scale(0);
      color: white; padding: 14px 28px; border-radius: 50px;
      font-size: 1.4em; font-weight: 800;
      box-shadow: 0 6px 24px rgba(0,0,0,0.25); z-index: 100;
      transition: transform 0.2s, opacity 0.2s;
      opacity: 0; pointer-events: none; white-space: nowrap;
    }
    #toast.show { transform: translateX(-50%) scale(1); opacity: 1; }

    .confetti-piece {
      position: fixed; top: -10px; pointer-events: none; z-index: 999;
      animation: confettiFall linear forwards;
    }
    @keyframes confettiFall { 0%{transform:translateY(0) rotate(0deg);opacity:1} 100%{transform:translateY(110vh) rotate(720deg);opacity:0} }

    #end-screen {
      display: none; position: fixed; inset: 0;
      background: linear-gradient(160deg,#4a148c,#7b1fa2,#ab47bc);
      flex-direction: column; align-items: center; justify-content: center;
      gap: 18px; z-index: 150; padding: 30px;
    }
    .end-trophy { font-size: 4.5em; animation: trophySpin 1.5s ease-out; }
    @keyframes trophySpin { from{transform:rotate(-20deg) scale(0)} 60%{transform:rotate(10deg) scale(1.1)} to{transform:rotate(0deg) scale(1)} }
    .end-title { color: #FFD700; font-size: clamp(1.5em,5vw,2.2em); font-weight: bold; text-shadow: 0 3px 10px rgba(0,0,0,0.3); text-align: center; }
    .end-sub { color: rgba(255,255,255,0.9); font-size: 1.1em; text-align: center; }
    .end-score-box { background: rgba(255,255,255,0.15); border-radius: 16px; padding: 12px 28px; color: white; font-size: 1.4em; font-weight: bold; }
    .end-stars { font-size: 2.2em; letter-spacing: 4px; }
    .btn-play-again { background: #FFD700; color: #333; border: none; border-radius: 50px; padding: 14px 36px; font-size: 1.1em; font-weight: 800; font-family: inherit; cursor: pointer; box-shadow: 0 4px 16px rgba(255,215,0,0.5); }

    @media (max-width: 768px) {
      #game-screen { padding: 10px 10px 76px; }
      .q-card { padding: 14px 10px; gap: 16px; }
      .dir-half { min-height: 190px; }
      .animal-wrap svg { width: 130px; height: 130px; }
      .dir-btn { height: 66px; font-size: 1.3em; }
      .hdr-title { display: none; }
    }
    @media (max-width: 480px) {
      #game-screen { padding: 8px 8px 76px; }
      .q-card { padding: 10px 8px; gap: 12px; border-radius: 18px; }
      .dir-half { min-height: 160px; padding: 10px 6px; }
      .animal-wrap svg { width: 105px; height: 105px; }
      .empty-slot { width: 80px; height: 80px; font-size: 2em; }
      .half-label { font-size: 0.85em; }
      .dir-btn { height: 60px; font-size: 1.15em; border-radius: 16px; }
      .dir-choices { gap: 10px; }
      .hdr-score { font-size: 1em; }
      .instruction { font-size: clamp(0.85em,3.5vw,1em); margin-bottom: 6px; }
    }
  </style>
</head>
<body>

<div id="bg-scene" aria-hidden="true">

  <!-- Rainbow -->
  <div class="bg-rainbow">
    <svg viewBox="0 0 800 220" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMax meet">
      <path d="M10,220 Q400,0 790,220"  fill="none" stroke="#FF0000" stroke-width="16" stroke-linecap="round" opacity="0.55"/>

      <path d="M50,220 Q400,44 750,220" fill="none" stroke="#FFD700" stroke-width="16" stroke-linecap="round" opacity="0.55"/>
      <path d="M70,220 Q400,66 730,220" fill="none" stroke="#32CD32" stroke-width="16" stroke-linecap="round" opacity="0.55"/>
      <path d="M90,220 Q400,88 710,220" fill="none" stroke="#1E90FF" stroke-width="16" stroke-linecap="round" opacity="0.55"/>
      <path d="M110,220 Q400,110 690,220" fill="none" stroke="#9400D3" stroke-width="16" stroke-linecap="round" opacity="0.55"/>
    </svg>
  </div>

  <!-- Sun -->
  <div class="bg-sun">
    <svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
      <g class="sun-rays">
        <rect x="37" y="1"  width="6" height="14" rx="3" fill="#FFD700"/>
        <rect x="37" y="65" width="6" height="14" rx="3" fill="#FFD700"/>
        <rect x="1"  y="37" width="14" height="6" rx="3" fill="#FFD700"/>
        <rect x="65" y="37" width="14" height="6" rx="3" fill="#FFD700"/>
        <rect x="13" y="10" width="6" height="14" rx="3" fill="#FFD700" transform="rotate(45 16 17)"/>
        <rect x="61" y="10" width="6" height="14" rx="3" fill="#FFD700" transform="rotate(-45 64 17)"/>
        <rect x="13" y="56" width="6" height="14" rx="3" fill="#FFD700" transform="rotate(-45 16 63)"/>
        <rect x="61" y="56" width="6" height="14" rx="3" fill="#FFD700" transform="rotate(45 64 63)"/>
      </g>
      <circle cx="40" cy="40" r="22" fill="#FFD700"/>
      <circle cx="40" cy="40" r="18" fill="#FFEC4D"/>
      <circle cx="33" cy="37" r="3" fill="#FF9800"/>
      <circle cx="47" cy="37" r="3" fill="#FF9800"/>
      <path d="M33,46 Q40,53 47,46" fill="none" stroke="#FF9800" stroke-width="2.5" stroke-linecap="round"/>
    </svg>
  </div>

  <!-- Clouds -->
  <div class="bg-cloud cloud1">
    <svg width="180" height="70" viewBox="0 0 180 70" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="90" cy="55" rx="78" ry="22" fill="white"/>
      <ellipse cx="60" cy="46" rx="38" ry="30" fill="white"/>
      <ellipse cx="104" cy="42" rx="34" ry="28" fill="white"/>
      <ellipse cx="78" cy="38" rx="44" ry="26" fill="white"/>
      <ellipse cx="90" cy="54" rx="76" ry="18" fill="rgba(220,235,255,0.5)"/>
    </svg>
  </div>
  <div class="bg-cloud cloud2">
    <svg width="140" height="56" viewBox="0 0 140 56" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="70" cy="44" rx="60" ry="18" fill="white"/>
      <ellipse cx="48" cy="36" rx="30" ry="24" fill="white"/>
      <ellipse cx="82" cy="33" rx="28" ry="22" fill="white"/>
      <ellipse cx="62" cy="30" rx="36" ry="22" fill="white"/>
    </svg>
  </div>
  <div class="bg-cloud cloud3">
    <svg width="120" height="48" viewBox="0 0 120 48" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="60" cy="38" rx="50" ry="16" fill="white"/>
      <ellipse cx="40" cy="30" rx="26" ry="20" fill="white"/>
      <ellipse cx="72" cy="28" rx="24" ry="18" fill="white"/>
      <ellipse cx="56" cy="26" rx="30" ry="18" fill="white"/>
    </svg>
  </div>

  <!-- Stars -->
  <div class="bg-star s1"></div>
  <div class="bg-star s2"></div>
  <div class="bg-star s3"></div>
  <div class="bg-star s4"></div>
  <div class="bg-star s5"></div>
  <div class="bg-star s6"></div>

  <!-- Butterfly flying across -->
  <div class="bg-butterfly">
    <svg width="44" height="38" viewBox="0 0 44 38" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="12" cy="14" rx="11" ry="9" fill="#E91E63" opacity="0.9" transform="rotate(-20 12 14)"/>
      <ellipse cx="32" cy="14" rx="11" ry="9" fill="#9C27B0" opacity="0.9" transform="rotate(20 32 14)"/>
      <ellipse cx="13" cy="27" rx="8" ry="6" fill="#FF9800" opacity="0.9" transform="rotate(22 13 27)"/>

  <!-- Bee buzzing -->
  <div class="bg-bee">
    <svg width="36" height="40" viewBox="0 0 36 40" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="10" cy="16" rx="10" ry="5.5" fill="rgba(210,240,255,0.82)" transform="rotate(-28 10 16)"/>
      <ellipse cx="26" cy="16" rx="10" ry="5.5" fill="rgba(210,240,255,0.82)" transform="rotate(28 26 16)"/>

      <circle cx="18" cy="14" r="7" fill="#FDD835"/>
      <circle cx="14" cy="13" r="2.5" fill="#1a1a1a"/>
      <circle cx="22" cy="13" r="2.5" fill="#1a1a1a"/>

      <circle cx="11" cy="1" r="2" fill="#F44336"/>
      <line x1="20" y1="7" x2="24" y2="2" stroke="#212121" stroke-width="1.5" stroke-linecap="round"/>
      <circle cx="25" cy="1" r="2" fill="#F44336"/>

  </div>

  <!-- Grass -->
  <div class="bg-grass">
    <svg width="100%" height="68" viewBox="0 0 800 68" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M0,30 Q100,0 200,28 Q300,56 400,24 Q500,0 600,30 Q700,56 800,28 L800,68 L0,68 Z" fill="#81C784"/>
      <path d="M0,38 Q120,14 240,36 Q360,58 480,32 Q600,10 720,36 L800,38 L800,68 L0,68 Z" fill="#66BB6A"/>
      <path d="M0,46 Q140,28 280,44 Q420,62 560,42 Q680,26 800,46 L800,68 L0,68 Z" fill="#4CAF50"/>
    </svg>
  </div>

};

const QUESTIONS = [
  { animal: 'cat',       name: 'cat',       side: 'right' },
  { animal: 'dog',       name: 'dog',       side: 'left'  },
  { animal: 'duck',      name: 'duck',      side: 'right' },
  { animal: 'butterfly', name: 'butterfly', side: 'left'  },
  { animal: 'bee',       name: 'bee',       side: 'right' },
  { animal: 'fish',      name: 'fish',      side: 'left'  },
  { animal: 'monkey',    name: 'monkey',    side: 'right' },
  { animal: 'rabbit',    name: 'rabbit',    side: 'left'  },
];

const sndWrong = new Audio('Assets/wrong.mp3');
const sndClaps = new Audio('Assets/free_claps.mp3');
let curQ = 0, score = 0, muted = false, answered = false, attempts = 0;

function speak(text) {
  sndClaps.pause(); sndClaps.currentTime = 0;
  if (!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  if (muted) return;
  setTimeout(() => {
    if (muted) return;
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'en-US'; u.rate = 0.8; u.pitch = 1.0;
    const voices = window.speechSynthesis.getVoices();
    const v = voices.find(v => v.lang.startsWith('en') && !v.name.includes('Google'))
           || voices.find(v => v.lang.startsWith('en')) || voices[0];
    if (v) u.voice = v;
    window.speechSynthesis.speak(u);
  }, 150);
}
window.speechSynthesis.getVoices();
window.speechSynthesis.addEventListener('voiceschanged', () => window.speechSynthesis.getVoices());

function playClaps() {
  if (muted) return;
  sndClaps.currentTime = 0; sndClaps.play().catch(() => {});
  setTimeout(() => { sndClaps.pause(); sndClaps.currentTime = 0; }, 3000);
}

function loadQuestion() {
  if (curQ >= 8) { showEnd(); return; }
  answered = false; attempts = 0;
  const q = QUESTIONS[curQ];
  document.getElementById('q-num').textContent     = curQ + 1;
  document.getElementById('score-val').textContent = score;
  document.getElementById('prog-bar').style.width  = (curQ / 8 * 100) + '%';
  const text = `Is the ${q.name} on the left or the right?`;
  document.getElementById('instruction-txt').textContent = text.toUpperCase();
  const svgHtml  = ANIMALS[q.animal];
  const emptyHtml = `<div class="empty-slot">?</div>`;
  document.getElementById('left-animal').innerHTML  = q.side === 'left'  ? svgHtml : emptyHtml;
  document.getElementById('right-animal').innerHTML = q.side === 'right' ? svgHtml : emptyHtml;
  document.getElementById('dir-scene').className = 'dir-scene';
  clearBtnStates();
  speak(text);
}

function selectDir(dir) {
  if (answered) return;
  if (dir === QUESTIONS[curQ].side) registerCorrect(dir);
  else registerWrong(dir);
}

function registerCorrect(dir) {
  if (answered) return;
  answered = true; score++;
  document.getElementById('score-val').textContent = score;
  document.getElementById('dir-scene').classList.add('correct');
  document.getElementById('btn-' + dir).classList.add('correct');
  window.speechSynthesis?.cancel();
  playClaps(); showToast('⭐ Correct!', '#4CAF50'); spawnConfetti();
  setTimeout(nextQuestion, 3200);
}

function registerWrong(dir) {
  if (answered) return;
  attempts++;
  if (attempts === 1) {
    sndWrong.currentTime = 0; if (!muted) sndWrong.play().catch(() => {});
    showToast('❌ Try again!', '#f44336');
    const wb = document.getElementById('btn-' + dir);
    wb.classList.add('wrong');
    document.getElementById('btn-' + QUESTIONS[curQ].side).classList.add('hint');
    setTimeout(() => { wb.classList.remove('wrong'); hideToast(); }, 900);
  } else {
    answered = true;
    sndWrong.currentTime = 0; if (!muted) sndWrong.play().catch(() => {});
    document.getElementById('btn-' + dir).classList.add('wrong');
    setTimeout(() => {
      showToast('💡 Correct answer!', '#FF9800');
      clearBtnStates();
      document.getElementById('btn-' + QUESTIONS[curQ].side).classList.add('correct');
      document.getElementById('dir-scene').classList.add('correct');
      setTimeout(nextQuestion, 3000);
    }, 1000);
  }
}

function nextQuestion() { clearBtnStates(); curQ++; loadQuestion(); }
function clearBtnStates() {
  document.getElementById('btn-left').classList.remove('correct','wrong','hint');
  document.getElementById('btn-right').classList.remove('correct','wrong','hint');
}

function startGame() {
  document.getElementById('intro-screen').style.display = 'none';
  document.getElementById('game-screen').style.display  = 'flex';
  curQ = 0; score = 0; loadQuestion();
}

function restartGame() {
  clearBtnStates(); window.speechSynthesis?.cancel();
  document.getElementById('end-screen').style.display  = 'none';
  document.getElementById('game-screen').style.display = 'flex';
  curQ = 0; score = 0; attempts = 0; answered = false; loadQuestion();
}

function showToast(msg, color) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.background = color; t.classList.add('show');
  setTimeout(hideToast, 1800);
}
function hideToast() { document.getElementById('toast').classList.remove('show'); }

function spawnConfetti() {
  const colors = ['#FF6B6B','#FFD93D','#6BCB77','#4D96FF','#FF922B','#cc5de8','#ff6b81'];
  for (let i = 0; i < 60; i++) {
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    p.style.cssText = `left:${Math.random()*100}vw;background:${colors[Math.floor(Math.random()*colors.length)]};width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;border-radius:${Math.random()>0.5?'50%':'2px'};animation-duration:${1.5+Math.random()*2}s;animation-delay:${Math.random()*0.8}s;`;
    document.body.appendChild(p);
    p.addEventListener('animationend', () => p.remove());
  }
}

function toggleMute() {
  muted = !muted;
  document.getElementById('mute-btn').textContent = muted ? '🔇' : '🔊';
  if (muted) { window.speechSynthesis?.cancel(); sndClaps.pause(); }
  else if (curQ < 8) speak(`Is the ${QUESTIONS[curQ].name} on the left or the right?`);
}

function showEnd() {
  document.getElementById('game-screen').style.display = 'none';
  document.getElementById('end-screen').style.display  = 'flex';
  document.getElementById('final-score').textContent   = score;
  document.getElementById('end-stars').textContent = score >= 7 ? '⭐⭐⭐' : score >= 5 ? '⭐⭐' : '⭐';
  window.speechSynthesis?.cancel();
  playClaps(); spawnConfetti(); setTimeout(spawnConfetti, 800);
}
</script>
</body>
</html>
