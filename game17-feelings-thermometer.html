<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Feelings Thermometer · LY4 · Game 17</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', Arial, sans-serif;
      background: linear-gradient(135deg, #fce4ec 0%, #e3f2fd 50%, #e8f5e9 100%);
      height: 100vh; height: 100dvh;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; user-select: none; -webkit-user-select: none;
    }

    #intro-screen {
      position: fixed; inset: 0;
      background: linear-gradient(160deg, #4a148c, #7b1fa2, #ab47bc);
      display: flex; align-items: center; justify-content: center;
      border: 5px solid #FFD700; z-index: 200; cursor: pointer;
    }
    #intro-logo { width: 200px; height: auto; animation: logoBounce 2s ease-in-out infinite; }
    @keyframes logoBounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }

    #game-screen {
      display: none; flex-direction: column;
      width: 100%; max-width: 700px; height: 100%;
      padding: 10px 12px 72px; overflow-y: auto;
    }

    .hdr {
      display: flex; align-items: center; justify-content: space-between;
      background: white; border-radius: 18px; padding: 8px 16px;
      margin-bottom: 8px; box-shadow: 0 4px 14px rgba(0,0,0,0.1); flex-shrink: 0;
    }
    .hdr-score { font-size: 1.1em; font-weight: bold; color: #4CAF50; min-width: 70px; }
    .hdr-title { font-size: clamp(0.75em,2.5vw,0.95em); color: #6a0dad; font-weight: bold; text-align: center; }
    .mute-btn { width: 36px; height: 36px; border: 2px solid #ddd; border-radius: 50%; background: white; cursor: pointer; font-size: 1.1em; display: flex; align-items: center; justify-content: center; touch-action: manipulation; }

    .progress-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-shrink: 0; }
    .progress-label { font-size: 0.82em; color: #777; white-space: nowrap; }
    .progress-bar-wrap { flex: 1; height: 8px; background: #eee; border-radius: 4px; overflow: hidden; }
    .progress-bar-fill { height: 100%; background: linear-gradient(90deg, #4CAF50, #8BC34A); border-radius: 4px; transition: width 0.5s; }

    .instruction {
      text-align: center; font-size: clamp(0.9em,2.8vw,1.05em);
      font-weight: 800; color: #333; margin-bottom: 10px;
      padding: 8px 14px; background: white; border-radius: 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08); flex-shrink: 0; line-height: 1.3;
    }

    .q-card {
      background: white; border-radius: 22px; padding: 14px 10px 12px;
      box-shadow: 0 6px 24px rgba(0,0,0,0.1);
      display: flex; flex-direction: column; align-items: center;
      gap: 14px; flex: 1; min-height: 0; overflow: hidden;
    }

    /* ── THREE-COLUMN LAYOUT ── */
    #thermo-layout {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      justify-content: center;
      width: 100%;
      flex: 1;
      min-height: 0;
    }

    /* LEFT — emotion word labels */
    .col-labels {
      display: flex; flex-direction: column;
      justify-content: flex-start;
      flex-shrink: 0;
    }
    .e-label {
      display: flex; align-items: center; justify-content: center;
      font-size: clamp(0.82em,2.4vw,0.95em); font-weight: 800; color: #333;
      border: 2.5px solid #ddd; border-radius: 20px;
      background: #fafafa; padding: 0 12px;
      white-space: nowrap;
    }

    /* CENTER — thermometer SVG */
    .col-thermo { flex-shrink: 0; display: flex; flex-direction: column; align-items: center; }
    #thermo-svg { display: block; overflow: visible; }

    /* RIGHT — emoji drop circles */
    .col-circles { display: flex; flex-direction: column; flex-shrink: 0; }
    .e-circle {
      border: 3px solid #ddd; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      background: #fafafa;
      transition: border-color 0.25s, background 0.25s, transform 0.15s;
      font-size: 1.6em;
    }
    .e-circle.drop-hover { border-color: #e91e63 !important; background: #fce4ec !important; transform: scale(1.08); }
    .e-circle.correct    { border-color: #4CAF50 !important; }
    .e-circle.wrong-anim { animation: shakeEl 0.4s ease; }
    @keyframes shakeEl { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-7px)} 75%{transform:translateX(7px)} }

    /* ── BOTTOM TRAY ── */
    #bottom-tray { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 8px; flex-shrink: 0; }

    #color-tray { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
    .color-swatch {
      border-radius: 50%; border: 4px solid transparent;
      cursor: pointer; box-shadow: 0 3px 10px rgba(0,0,0,0.2);
      transition: transform 0.15s, border-color 0.15s;
      touch-action: manipulation;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.68em; font-weight: 800; color: white;
      text-shadow: 0 1px 3px rgba(0,0,0,0.4);
    }
    .color-swatch:active { transform: scale(0.9); }
    .color-swatch.selected { border-color: #222 !important; transform: scale(1.18); box-shadow: 0 0 0 3px rgba(0,0,0,0.2); }

    #emoji-tray { display: none; gap: 10px; justify-content: center; flex-wrap: wrap; }
    .emoji-card {
      border-radius: 14px; background: white; border: 3px solid #e0e0e0;
      display: flex; align-items: center; justify-content: center;
      cursor: grab; box-shadow: 0 3px 10px rgba(0,0,0,0.12);
      transition: opacity 0.3s, transform 0.15s;
      touch-action: none;
    }
    .emoji-card:active { transform: scale(1.1); cursor: grabbing; }
    .emoji-card.placed { opacity: 0.3; pointer-events: none; }

    #drag-clone {
      position: fixed; pointer-events: none; z-index: 9999;
      transform: translate(-50%, -50%);
      display: none; line-height: 1;
    }

    /* ── SVG section shake ── */
    .sec-shake { animation: secShake 0.4s ease; }
    @keyframes secShake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }

    /* ── TOAST ── */
    #toast {
      position: fixed; top: 16%; left: 50%; transform: translateX(-50%) scale(0.7);
      padding: 12px 24px; border-radius: 40px; font-size: 1.2em;
      font-weight: bold; color: white; pointer-events: none;
      opacity: 0; transition: opacity 0.2s, transform 0.2s; z-index: 500;
      white-space: nowrap; box-shadow: 0 8px 24px rgba(0,0,0,0.2);
    }
    #toast.show { opacity: 1; transform: translateX(-50%) scale(1); }

    /* ── BOTTOM RESTART ── */
    .bottom-row { display: flex; justify-content: center; position: fixed; bottom: 14px; left: 0; right: 0; z-index: 50; pointer-events: none; }
    .btn-restart { pointer-events: all; background: linear-gradient(135deg,#FF9800,#F57C00); color: white; border: none; padding: 12px 30px; border-radius: 40px; font-size: 1em; font-family: inherit; font-weight: bold; cursor: pointer; box-shadow: 0 5px 14px rgba(255,152,0,0.4); touch-action: manipulation; min-height: 44px; }

    /* ── END SCREEN ── */
    #end-screen {
      display: none; position: fixed; inset: 0;
      background: linear-gradient(160deg, #4a148c, #7b1fa2, #ab47bc);
      flex-direction: column; align-items: center; justify-content: center;
      gap: 14px; color: white; text-align: center; z-index: 100;
      border: 5px solid #FFD700; padding: 30px;
    }
    .end-trophy { font-size: 4em; animation: trophySpin 1.5s ease-out; }
    @keyframes trophySpin { from{transform:rotate(-20deg) scale(0)} 60%{transform:rotate(10deg) scale(1.1)} to{transform:rotate(0) scale(1)} }
    .end-title  { color: #FFD700; font-size: clamp(1.5em,5vw,2.2em); font-weight: 800; }
    .end-sub    { color: rgba(255,255,255,0.9); font-size: 1.05em; }
    .end-score-box { background: rgba(255,255,255,0.15); border: 2px solid rgba(255,255,255,0.35); border-radius: 20px; padding: 14px 36px; font-size: 1.6em; font-weight: bold; }
    .end-stars  { font-size: 2.2em; letter-spacing: 4px; }
    .btn-play-again { background: #FFD700; color: #333; border: none; padding: 14px 40px; border-radius: 40px; font-size: 1.1em; font-family: inherit; font-weight: bold; cursor: pointer; touch-action: manipulation; min-height: 44px; }

    .confetti-piece { position: fixed; pointer-events: none; z-index: 9998; border-radius: 2px; top: -10px; }
    @keyframes confettiFall { to { transform: translateY(110vh) rotate(720deg); opacity: 0; } }

    @media(max-width:480px) {
      #game-screen { padding: 8px 8px 68px; }
      .q-card { padding: 10px 6px 10px; gap: 10px; }
      #thermo-layout { gap: 6px; }
    }
    @media(max-height:640px) {
      .q-card { gap: 8px; padding: 8px 6px; }
    }
  </style>
</head>
<body>

<div id="intro-screen" onclick="startGame()">
  <img id="intro-logo" src="Assets/innovinelogo.png" alt="Innovine" onerror="this.style.display='none'">
</div>

<div id="game-screen">
  <div class="hdr">
    <div class="hdr-score">⭐ <span id="score-val">0</span> / 15</div>
    <div class="hdr-title">Feelings Thermometer</div>
    <button class="mute-btn" id="mute-btn" onclick="toggleMute()">🔊</button>
  </div>

  <div class="progress-row">
    <span class="progress-label">Round <span id="round-num">1</span></span>
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="prog-bar" style="width:0%"></div></div>
    <span class="progress-label" id="round-badge">Round 1 of 3</span>
  </div>

  <div class="instruction" id="instruction-txt">🎨 Tap a colour swatch, then tap the matching section!</div>

  <div class="q-card">
    <div id="thermo-layout">
      <div class="col-labels" id="col-labels"></div>
      <div class="col-thermo">
        <svg id="thermo-svg" xmlns="http://www.w3.org/2000/svg"></svg>
      </div>
      <div class="col-circles" id="col-circles"></div>
    </div>

    <div id="bottom-tray">
      <div id="color-tray"></div>
      <div id="emoji-tray"></div>
    </div>
  </div>
</div>

<div id="end-screen">
  <div class="end-trophy">🌡️</div>
  <div class="end-title">Wonderful!</div>
  <div class="end-sub">You know all about feelings!</div>
  <div class="end-score-box">Score: &nbsp;<span id="final-score">0</span> / 15</div>
  <div class="end-stars" id="end-stars"></div>
  <button class="btn-play-again" onclick="restartGame()">▶ &nbsp;Play Again</button>
</div>

<div class="bottom-row">
  <button class="btn-restart" onclick="restartGame()">↺ &nbsp;Restart</button>
</div>

<div id="toast"></div>
<div id="drag-clone"></div>

<script>
/* ── DATA ── */
const EMOTIONS = [
  { id:0, name:'Angry',   emoji:'😡', color:'#e53935', colorLabel:'Red',    textColor:'#fff' },
  { id:1, name:'Sad',     emoji:'😢', color:'#FB8C00', colorLabel:'Orange', textColor:'#fff' },
  { id:2, name:'Worried', emoji:'😟', color:'#F9A825', colorLabel:'Yellow', textColor:'#333' },
  { id:3, name:'Happy',   emoji:'😊', color:'#43A047', colorLabel:'Green',  textColor:'#fff' },
  { id:4, name:'Calm',    emoji:'😌', color:'#1E88E5', colorLabel:'Blue',   textColor:'#fff' },
];

const TOTAL_ROUNDS = 3;
const ROW_H   = 58;  // px — height of each row (label, section, circle)
const TUBE_W  = 46;  // px — thermometer tube width
const BULB_R  = 30;  // px — bulb radius
const SVG_PAD = 4;   // horizontal padding inside SVG

let currentRound = 0, score = 0, muted = false;
let phase = 1;
let coloredSections = {};
let placedEmojis    = {};
let selectedColor   = null;
let wrongColor      = {};
let wrongEmoji      = {};
let busy            = false;

const sndWrong = new Audio('Assets/wrong.mp3');
const sndClaps = new Audio('Assets/free_claps.mp3');

function unlockAudio() {
  [sndWrong, sndClaps].forEach(s => { s.play().catch(()=>{}); s.pause(); s.currentTime = 0; });
  document.removeEventListener('pointerdown', unlockAudio);
}
document.addEventListener('pointerdown', unlockAudio);

function speak(text) {
  sndClaps.pause(); sndClaps.currentTime = 0;
  if (!('speechSynthesis' in window) || muted) return;
  window.speechSynthesis.cancel();
  setTimeout(() => {
    if (muted) return;
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'en-US'; u.rate = 0.75;
    const voices = window.speechSynthesis.getVoices();
    const v = voices.find(v => v.lang.startsWith('en') && !v.name.includes('Google'))
           || voices.find(v => v.lang.startsWith('en')) || voices[0];
    if (v) u.voice = v;
    window.speechSynthesis.speak(u);
  }, 150);
}
window.speechSynthesis?.getVoices();
window.speechSynthesis?.addEventListener('voiceschanged', () => window.speechSynthesis.getVoices());

function playClaps() {
  if (muted) return;
  sndClaps.currentTime = 0; sndClaps.play().catch(()=>{});
  setTimeout(() => { sndClaps.pause(); sndClaps.currentTime = 0; }, 3000);
}

function toggleMute() {
  muted = !muted;
  document.getElementById('mute-btn').textContent = muted ? '🔇' : '🔊';
  if (muted) { window.speechSynthesis?.cancel(); sndClaps.pause(); }
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

/* ── BUILD ROUND ── */
function buildRound() {
  phase = 1; busy = false;
  coloredSections = {}; placedEmojis = {};
  selectedColor   = null; wrongColor = {}; wrongEmoji = {};

  document.getElementById('round-num').textContent   = currentRound + 1;
  document.getElementById('round-badge').textContent = `Round ${currentRound + 1} of ${TOTAL_ROUNDS}`;
  document.getElementById('prog-bar').style.width    = (currentRound / TOTAL_ROUNDS * 100) + '%';
  document.getElementById('score-val').textContent   = score;

  buildLabels();
  buildThermometer();
  buildCircles();
  buildColorTray();
  buildEmojiTray();

  document.getElementById('instruction-txt').textContent = '🎨 Tap a colour swatch, then tap the matching section!';
  speak('Tap a colour, then tap the right section on the thermometer!');
}

/* LEFT COLUMN — word labels */
function buildLabels() {
  const col = document.getElementById('col-labels');
  col.innerHTML = '';
  EMOTIONS.forEach(e => {
    const d = document.createElement('div');
    d.className = 'e-label';
    d.style.height       = ROW_H + 'px';
    d.style.marginBottom = '0px';
    d.textContent = e.name;
    col.appendChild(d);
  });
}

/* CENTER COLUMN — thermometer SVG */
function buildThermometer() {
  const svgW   = TUBE_W + SVG_PAD * 2;
  const tubeH  = EMOTIONS.length * ROW_H;
  const svgH   = tubeH + BULB_R * 2 + 10;
  const cx     = svgW / 2;
  const tubeX  = SVG_PAD;
  const bulbCY = tubeH + BULB_R + 6;
  const neckW  = 14;

  const svg = document.getElementById('thermo-svg');
  svg.setAttribute('viewBox', `0 0 ${svgW} ${svgH}`);
  svg.setAttribute('width',  svgW);
  svg.setAttribute('height', svgH);

  let s = '';

  /* tube background */
  s += `<rect x="${tubeX}" y="0" width="${TUBE_W}" height="${tubeH}" rx="5" fill="#f0f0f0" stroke="#bbb" stroke-width="2"/>`;

  /* section fill rects (invisible until colored) */
  EMOTIONS.forEach((e, i) => {
    const sy = i * ROW_H;
    const rx = i === 0 ? 4 : 0;
    s += `<rect id="fill-${e.id}" x="${tubeX+1}" y="${sy+1}" width="${TUBE_W-2}" height="${ROW_H-1}" rx="${rx}" fill="none" opacity="0.82"/>`;
    /* color label text inside section */
    s += `<text id="label-${e.id}" x="${cx}" y="${sy + ROW_H/2 + 5}" text-anchor="middle" font-size="10" font-family="Nunito,sans-serif" font-weight="800" fill="#aaa" pointer-events="none">${e.colorLabel}</text>`;
  });

  /* divider dashes */
  for (let i = 1; i < EMOTIONS.length; i++) {
    const y = i * ROW_H;
    s += `<line x1="${tubeX}" y1="${y}" x2="${tubeX+TUBE_W}" y2="${y}" stroke="#bbb" stroke-width="1.5" stroke-dasharray="5,4"/>`;
  }

  /* tube border on top */
  s += `<rect x="${tubeX}" y="0" width="${TUBE_W}" height="${tubeH}" rx="5" fill="none" stroke="#999" stroke-width="2.5"/>`;

  /* neck */
  s += `<rect id="neck-fill" x="${cx-neckW/2}" y="${tubeH-1}" width="${neckW}" height="${BULB_R+7}" fill="#f0f0f0"/>`;
  s += `<line x1="${cx-neckW/2}" y1="${tubeH}" x2="${cx-neckW/2}" y2="${tubeH+BULB_R}" stroke="#999" stroke-width="2.5"/>`;
  s += `<line x1="${cx+neckW/2}" y1="${tubeH}" x2="${cx+neckW/2}" y2="${tubeH+BULB_R}" stroke="#999" stroke-width="2.5"/>`;

  /* bulb */
  s += `<circle id="bulb-fill" cx="${cx}" cy="${bulbCY}" r="${BULB_R-1}" fill="#f0f0f0" opacity="0.82"/>`;
  s += `<circle cx="${cx}" cy="${bulbCY}" r="${BULB_R}" fill="none" stroke="#999" stroke-width="2.5"/>`;

  /* clickable overlays */
  EMOTIONS.forEach((e, i) => {
    const sy = i * ROW_H;
    s += `<rect class="t-tap" data-id="${e.id}" x="${tubeX}" y="${sy}" width="${TUBE_W}" height="${ROW_H}" fill="transparent" style="cursor:pointer"/>`;
  });

  svg.innerHTML = s;

  svg.querySelectorAll('.t-tap').forEach(el => {
    el.addEventListener('click', () => onSectionTap(+el.dataset.id));
    el.addEventListener('touchend', ev => { ev.preventDefault(); onSectionTap(+el.dataset.id); });
  });
}

/* RIGHT COLUMN — drop circles */
function buildCircles() {
  const col = document.getElementById('col-circles');
  col.innerHTML = '';
  const size = ROW_H - 10;
  EMOTIONS.forEach(e => {
    const d = document.createElement('div');
    d.className   = 'e-circle';
    d.id          = `circle-${e.id}`;
    d.dataset.id  = e.id;
    d.style.width  = size + 'px';
    d.style.height = size + 'px';
    d.style.margin = '5px 4px';
    col.appendChild(d);
  });
}

/* COLOR SWATCHES — phase 1 */
function buildColorTray() {
  const tray = document.getElementById('color-tray');
  tray.innerHTML = '';
  tray.style.display = 'flex';
  document.getElementById('emoji-tray').style.display = 'none';

  const size = Math.min(50, Math.floor((window.innerWidth - 80) / EMOTIONS.length) - 10);

  EMOTIONS.forEach(e => {
    const sw = document.createElement('div');
    sw.className      = 'color-swatch';
    sw.dataset.color  = e.color;
    sw.title          = e.colorLabel;
    sw.style.background = e.color;
    sw.style.width  = size + 'px';
    sw.style.height = size + 'px';
    sw.style.color  = e.textColor;
    sw.textContent  = e.colorLabel;
    sw.addEventListener('click', () => onColorSelect(e.color, sw));
    tray.appendChild(sw);
  });
}

/* EMOJI CARDS — phase 2 */
function buildEmojiTray() {
  const tray = document.getElementById('emoji-tray');
  tray.innerHTML = '';
  const size = Math.min(58, Math.floor((window.innerWidth - 80) / EMOTIONS.length) - 8);
  const shuffled = shuffle([...EMOTIONS]);
  shuffled.forEach(e => {
    const card = document.createElement('div');
    card.className    = 'emoji-card';
    card.dataset.id   = e.id;
    card.textContent  = e.emoji;
    card.style.width  = size + 'px';
    card.style.height = size + 'px';
    card.style.fontSize = Math.round(size * 0.55) + 'px';
    setupEmojiDrag(card);
    tray.appendChild(card);
  });
}

/* ── PHASE 1: COLORING ── */
function onColorSelect(color, swEl) {
  selectedColor = color;
  document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
  swEl.classList.add('selected');
}

function onSectionTap(id) {
  if (phase !== 1 || busy) return;
  if (coloredSections[id]) { showToast('✅ Already coloured!', '#FF9800'); return; }
  if (!selectedColor) {
    showToast('👆 Pick a colour first!', '#FF9800');
    speak('Pick a colour first!');
    return;
  }

  const emotion = EMOTIONS[id];

  if (selectedColor === emotion.color) {
    /* CORRECT color */
    coloredSections[id] = true;
    fillSection(id, emotion.color, emotion.textColor);
    showToast('✅ ' + emotion.colorLabel + '!', '#4CAF50');

    selectedColor = null;
    document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));

    if (Object.keys(coloredSections).length === EMOTIONS.length) {
      setTimeout(startPhase2, 900);
    }
  } else {
    /* WRONG color */
    if (!wrongColor[id]) wrongColor[id] = 0;
    wrongColor[id]++;
    if (!muted) { sndWrong.currentTime = 0; sndWrong.play().catch(()=>{}); }
    showToast('❌ Wrong colour! Try ' + emotion.colorLabel + '!', '#f44336');

    /* Shake the section visually */
    const fill = document.getElementById(`fill-${id}`);
    if (fill) {
      fill.style.animation = 'none';
      requestAnimationFrame(() => {
        fill.style.animation = '';
        fill.classList.add('sec-shake');
        fill.addEventListener('animationend', () => fill.classList.remove('sec-shake'), { once: true });
      });
    }

    if (wrongColor[id] >= 2) {
      /* Auto-reveal */
      coloredSections[id] = true;
      fillSection(id, emotion.color, emotion.textColor);
      selectedColor = null;
      document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
      if (Object.keys(coloredSections).length === EMOTIONS.length) {
        setTimeout(startPhase2, 900);
      }
    }
  }
}

function fillSection(id, color, textColor) {
  const fill = document.getElementById(`fill-${id}`);
  if (fill) fill.setAttribute('fill', color);

  /* Update label text colour for contrast */
  const lbl = document.getElementById(`label-${id}`);
  if (lbl) lbl.setAttribute('fill', textColor === '#fff' ? 'rgba(255,255,255,0.85)' : 'rgba(0,0,0,0.5)');

  /* Calm (id 4) also fills neck and bulb */
  if (id === 4) {
    const bulb = document.getElementById('bulb-fill');
    if (bulb) bulb.setAttribute('fill', color);
    const neck = document.getElementById('neck-fill');
    if (neck) neck.setAttribute('fill', color);
  }
}

/* ── PHASE 2: EMOJI DRAG ── */
function startPhase2() {
  phase = 2;
  document.getElementById('instruction-txt').textContent = '😊 Drag each emoji to the matching feeling circle!';
  speak('Now drag each emoji to the right circle!');
  document.getElementById('color-tray').style.display  = 'none';
  document.getElementById('emoji-tray').style.display  = 'flex';
}

let dragId         = null;
let dragOriginCard = null;
const dragCloneEl  = document.getElementById('drag-clone');

function setupEmojiDrag(card) {
  card.addEventListener('pointerdown', e => {
    if (phase !== 2 || card.classList.contains('placed')) return;
    e.preventDefault();
    dragId         = +card.dataset.id;
    dragOriginCard = card;
    card.setPointerCapture(e.pointerId);

    dragCloneEl.textContent  = EMOTIONS[dragId].emoji;
    dragCloneEl.style.display  = 'block';
    dragCloneEl.style.fontSize = '2.2em';
    dragCloneEl.style.left     = e.clientX + 'px';
    dragCloneEl.style.top      = e.clientY + 'px';
  });

  card.addEventListener('pointermove', e => {
    if (dragId === null) return;
    dragCloneEl.style.left = e.clientX + 'px';
    dragCloneEl.style.top  = e.clientY + 'px';

    /* Hover highlight */
    document.querySelectorAll('.e-circle').forEach(c => c.classList.remove('drop-hover'));
    dragCloneEl.style.display = 'none';
    const under = document.elementFromPoint(e.clientX, e.clientY);
    dragCloneEl.style.display = 'block';
    const target = under?.closest('.e-circle');
    if (target && !target.classList.contains('correct')) target.classList.add('drop-hover');
  });

  card.addEventListener('pointerup', e => {
    if (dragId === null) return;
    dragCloneEl.style.display = 'none';
    document.querySelectorAll('.e-circle').forEach(c => c.classList.remove('drop-hover'));

    dragCloneEl.style.display = 'none';
    const under = document.elementFromPoint(e.clientX, e.clientY);
    dragCloneEl.style.display = 'block';
    dragCloneEl.style.display = 'none';

    const target = under?.closest('.e-circle');

    if (target && !placedEmojis[+target.dataset.id]) {
      const cid = +target.dataset.id;
      if (cid === dragId) {
        /* CORRECT */
        if (!wrongEmoji[dragId]) score++;
        document.getElementById('score-val').textContent = score;

        placedEmojis[cid] = true;
        target.textContent = EMOTIONS[dragId].emoji;
        target.classList.add('correct');
        target.style.borderColor = EMOTIONS[dragId].color;
        target.style.background  = hexRgba(EMOTIONS[dragId].color, 0.15);
        dragOriginCard?.classList.add('placed');
        showToast('⭐ Correct!', '#4CAF50');

        if (Object.keys(placedEmojis).length === EMOTIONS.length) onRoundComplete();
      } else {
        /* WRONG */
        if (!wrongEmoji[dragId]) wrongEmoji[dragId] = 0;
        wrongEmoji[dragId]++;
        if (!muted) { sndWrong.currentTime = 0; sndWrong.play().catch(()=>{}); }
        showToast('❌ Try again!', '#f44336');
        target.classList.add('wrong-anim');
        target.addEventListener('animationend', () => target.classList.remove('wrong-anim'), { once: true });

        if (wrongEmoji[dragId] >= 2) {
          /* Auto-reveal */
          const correct = document.getElementById(`circle-${dragId}`);
          if (correct && !placedEmojis[dragId]) {
            placedEmojis[dragId] = true;
            correct.textContent = EMOTIONS[dragId].emoji;
            correct.classList.add('correct');
            correct.style.borderColor = EMOTIONS[dragId].color;
            correct.style.background  = hexRgba(EMOTIONS[dragId].color, 0.15);
            dragOriginCard?.classList.add('placed');
            if (Object.keys(placedEmojis).length === EMOTIONS.length) onRoundComplete();
          }
        }
      }
    }

    dragId = null; dragOriginCard = null;
  });
}

function hexRgba(hex, a) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

function onRoundComplete() {
  window.speechSynthesis?.cancel();
  playClaps();
  spawnConfetti();
  setTimeout(spawnConfetti, 600);
  currentRound++;
  if (currentRound >= TOTAL_ROUNDS) setTimeout(showEnd, 1800);
  else setTimeout(buildRound, 2100);
}

function showEnd() {
  window.speechSynthesis?.cancel();
  document.getElementById('game-screen').style.display = 'none';
  const end = document.getElementById('end-screen');
  end.style.display = 'flex';
  document.getElementById('final-score').textContent = score;
  document.getElementById('end-stars').textContent   = score >= 13 ? '⭐⭐⭐' : score >= 9 ? '⭐⭐' : '⭐';
  document.getElementById('prog-bar').style.width    = '100%';
  speak(`You scored ${score} out of 15! Wonderful work!`);
}

function startGame() {
  document.getElementById('intro-screen').style.display = 'none';
  document.getElementById('game-screen').style.display  = 'flex';
  currentRound = 0; score = 0;
  buildRound();
}

function restartGame() {
  window.speechSynthesis?.cancel();
  document.getElementById('end-screen').style.display  = 'none';
  document.getElementById('game-screen').style.display = 'flex';
  currentRound = 0; score = 0;
  buildRound();
}

let toastTimer;
function showToast(msg, color) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.background = color;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 1500);
}

function spawnConfetti() {
  const colors = ['#FF6B6B','#FFD93D','#6BCB77','#4D96FF','#FF922B','#cc5de8'];
  for (let i = 0; i < 55; i++) {
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    p.style.cssText = `left:${Math.random()*100}vw;background:${colors[Math.floor(Math.random()*colors.length)]};width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;border-radius:${Math.random()>0.5?'50%':'2px'};animation:confettiFall ${1.5+Math.random()*2}s ease ${Math.random()*0.4}s forwards;`;
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 3500);
  }
}
</script>
