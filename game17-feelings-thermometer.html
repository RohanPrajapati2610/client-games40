<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Feelings Thermometer · LY4 · Game 17</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', 'Trebuchet MS', Arial, sans-serif;
      background: linear-gradient(135deg, #fce4ec 0%, #e8f5e9 50%, #e3f2fd 100%);
      height: 100vh; height: 100dvh;
      display: flex; align-items: stretch; justify-content: center;
      overflow: hidden; user-select: none; -webkit-user-select: none;
    }

    /* ── INTRO ── */
    #intro-screen {
      position: fixed; inset: 0;
      background: linear-gradient(160deg, #4a148c, #7b1fa2, #ab47bc);
      display: flex; align-items: center; justify-content: center;
      border: 5px solid #FFD700; z-index: 200;
    }
    #intro-logo { width: 220px; height: auto; filter: drop-shadow(0 6px 20px rgba(0,0,0,0.5)); animation: logoBounce 2s ease-in-out infinite; cursor: pointer; -webkit-user-drag: none; opacity: 0; transition: opacity 0.3s; }
    #intro-logo.loaded { opacity: 1; }
    @keyframes logoBounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }

    /* ── GAME ── */
    #game-screen {
      display: none; flex-direction: column;
      width: 100%; max-width: 860px; height: 100%; padding: 14px 14px 70px;
      overflow-y: auto;
    }

    .hdr { display:flex; align-items:center; justify-content:space-between; background:white; border-radius:18px; padding:10px 18px; margin-bottom:12px; box-shadow:0 4px 14px rgba(0,0,0,0.1); flex-shrink:0; }
    .hdr-score { font-size:1.2em; font-weight:bold; color:#4CAF50; min-width:70px; }
    .hdr-title { font-size:clamp(0.75em,2.5vw,1em); color:#6a0dad; font-weight:bold; text-align:center; }
    .mute-btn { width:38px; height:38px; border:2px solid #ddd; border-radius:50%; background:white; font-size:1.1em; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:border-color 0.2s; touch-action:manipulation; }

    .progress-row { display:flex; align-items:center; gap:10px; margin-bottom:10px; flex-shrink:0; }
    .progress-label { font-size:0.9em; color:#777; white-space:nowrap; }
    .progress-bar-wrap { flex:1; height:10px; background:#e0e0e0; border-radius:5px; overflow:hidden; }
    .progress-bar-fill { height:100%; border-radius:5px; background:linear-gradient(90deg,#4CAF50,#8BC34A); transition:width 0.5s ease; }

    .question-txt { text-align:center; font-size:clamp(1em,3.5vw,1.2em); color:#333; font-weight:bold; margin-bottom:10px; min-height:1.5em; padding:0 10px; line-height:1.4; flex-shrink:0; }

    /* ── CARD ── */
    .scene-card { background:white; border-radius:24px; padding:18px 16px; box-shadow:0 6px 24px rgba(0,0,0,0.1); flex:1; min-height:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; overflow:hidden; }

    /* ── THREE-COLUMN THERMO LAYOUT ── */
    #thermo-layout {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: start;
      gap: 14px;
      width: fit-content;
      flex: 0 0 auto;
    }

    .col-labels { display:flex; flex-direction:column; align-items:flex-end; }
    .e-label {
      display:flex; align-items:center; justify-content:center;
      font-size:clamp(0.82em,2.4vw,0.95em); font-weight:800; color:#333;
      border:2.5px solid #ddd; border-radius:22px;
      background:#fafafa; padding:0 14px; white-space:nowrap; width:100%;
    }

    .col-thermo { display:flex; flex-direction:column; align-items:center; }
    #thermo-svg { display:block; overflow:visible; }

    .col-circles { display:flex; flex-direction:column; align-items:flex-start; }
    .e-circle {
      border:3px solid #ddd; border-radius:50%;
      display:flex; align-items:center; justify-content:center;
      background:#f9f9f9; font-size:1.6em;
      transition:border-color 0.25s, background 0.25s, transform 0.15s;
    }
    .e-circle.correct    { border-color:#4CAF50 !important; }
    .e-circle.wrong-anim { animation:shakeEl 0.4s ease; }
    @keyframes shakeEl { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-7px)} 75%{transform:translateX(7px)} }

    /* ── HINT ── */
    /* Emoji phase: glow the correct circle */
    .e-circle.hint-circle {
      border:4px dashed #FFD700 !important;
      animation:hintGlow 0.8s ease-in-out infinite;
    }
    /* Color phase: SVG section hint rect — animated via CSS */
    .svg-hint {
      animation:svgHintPulse 0.8s ease-in-out infinite;
    }
    @keyframes svgHintPulse {
      0%,100% { opacity:0.55; }
      50%      { opacity:1; }
    }
    @keyframes hintGlow {
      0%,100% { box-shadow:0 0 10px 3px rgba(255,215,0,0.5); }
      50%      { box-shadow:0 0 24px 8px rgba(255,215,0,0.9); }
    }

    /* ── BOTTOM TRAY ── */
    #bottom-tray { width:100%; display:flex; flex-direction:column; align-items:center; gap:10px; flex-shrink:0; }

    #color-tray { display:flex; gap:12px; justify-content:center; flex-wrap:wrap; }
    .color-swatch {
      border-radius:50%; border:4px solid transparent;
      cursor:pointer; box-shadow:0 3px 10px rgba(0,0,0,0.2);
      transition:transform 0.15s, border-color 0.15s, box-shadow 0.2s;
      touch-action:manipulation;
      display:flex; align-items:center; justify-content:center;
      font-size:0.72em; font-weight:800;
      text-shadow:0 1px 3px rgba(0,0,0,0.5);
    }
    .color-swatch:active { transform:scale(0.9); }
    .color-swatch.selected { border-color:#222 !important; transform:scale(1.2); box-shadow:0 0 0 4px rgba(0,0,0,0.15) !important; }

    #emoji-tray { display:none; gap:12px; justify-content:center; flex-wrap:wrap; }
    .emoji-card {
      border-radius:14px; background:white; border:3px solid #e0e0e0;
      display:flex; align-items:center; justify-content:center;
      cursor:grab; box-shadow:0 3px 10px rgba(0,0,0,0.12);
      transition:opacity 0.3s, transform 0.15s; touch-action:none;
    }
    .emoji-card:active { cursor:grabbing; transform:scale(1.12); }
    .emoji-card.placed { opacity:0.3; pointer-events:none; }

    #drag-clone { position:fixed; pointer-events:none; z-index:9999; transform:translate(-50%,-50%); display:none; line-height:1; }

    /* ── TOAST (matches game4) ── */
    #toast { position:fixed; top:18%; left:50%; transform:translateX(-50%) scale(0.7); padding:14px 30px; border-radius:50px; font-size:1.5em; font-weight:bold; color:white; pointer-events:none; opacity:0; transition:opacity 0.2s,transform 0.2s; z-index:500; white-space:nowrap; box-shadow:0 8px 24px rgba(0,0,0,0.2); }
    #toast.show { opacity:1; transform:translateX(-50%) scale(1); }

    /* ── BOTTOM ── */
    .bottom-row { display:flex; justify-content:center; position:fixed; bottom:16px; left:0; right:0; z-index:50; pointer-events:none; }
    .btn-restart { pointer-events:all; background:linear-gradient(135deg,#FF9800,#F57C00); color:white; border:none; padding:12px 32px; border-radius:40px; font-size:1em; font-family:inherit; font-weight:bold; cursor:pointer; box-shadow:0 5px 14px rgba(255,152,0,0.4); touch-action:manipulation; min-height:44px; }

    /* ── END (matches game4) ── */
    #end-screen { display:none; position:fixed; inset:0; background:linear-gradient(160deg,#4a148c,#7b1fa2,#ab47bc); flex-direction:column; align-items:center; justify-content:center; gap:16px; z-index:200; text-align:center; padding:30px; }
    .end-trophy { font-size:4.5em; animation:trophySpin 1.5s ease-out; }
    @keyframes trophySpin { from{transform:rotate(-20deg) scale(0)} 60%{transform:rotate(10deg) scale(1.1)} to{transform:rotate(0) scale(1)} }
    .end-title  { color:#FFD700; font-size:clamp(1.5em,5vw,2.2em); font-weight:bold; text-shadow:0 3px 10px rgba(0,0,0,0.3); }
    .end-sub    { color:rgba(255,255,255,0.9); font-size:1.1em; }
    .end-score-box { background:rgba(255,255,255,0.15); border:2px solid rgba(255,255,255,0.35); border-radius:20px; padding:16px 40px; color:white; font-size:1.8em; font-weight:bold; }
    .end-stars  { font-size:2.2em; letter-spacing:4px; }
    .btn-play-again { background:#FFD700; color:#333; border:none; padding:15px 45px; border-radius:40px; font-size:1.2em; font-family:inherit; font-weight:bold; cursor:pointer; box-shadow:0 6px 20px rgba(0,0,0,0.2); margin-top:8px; touch-action:manipulation; }

    .confetti { position:fixed; pointer-events:none; z-index:9998; border-radius:2px; }

    @media(max-width:768px) { #game-screen{padding:10px 10px 68px;} .hdr-title{display:none;} }
    @media(max-width:480px) { .scene-card{padding:12px 8px;gap:10px;} #thermo-layout{gap:8px;} }
    @media(max-height:680px) { .scene-card{gap:8px;padding:10px 8px;} }
  </style>
</head>
<body>

<div id="intro-screen">
  <img id="intro-logo" src="Assets/innovinelogo.png" alt="Innovine" onclick="startGame()" onerror="this.style.display='none'" onload="this.classList.add('loaded')">
</div>

<div id="toast"></div>

<div id="game-screen">
  <div class="hdr">
    <div class="hdr-score">⭐ <span id="score-val">0</span> / 5</div>
    <div class="hdr-title">Feelings Thermometer</div>
    <button class="mute-btn" id="mute-btn" onclick="toggleMute()">🔊</button>
  </div>

  <div class="progress-row">
    <span class="progress-label">Round <span id="round-num">1</span> / 1</span>
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="prog-bar" style="width:0%"></div></div>
  </div>

  <div class="question-txt" id="question-txt"></div>

  <div class="scene-card">
    <div id="thermo-layout">
      <div class="col-labels" id="col-labels"></div>
      <div class="col-thermo"><svg id="thermo-svg" xmlns="http://www.w3.org/2000/svg"></svg></div>
      <div class="col-circles" id="col-circles"></div>
    </div>
    <div id="bottom-tray">
      <div id="color-tray"></div>
      <div id="emoji-tray"></div>
    </div>
  </div>

  <div class="bottom-row">
    <button class="btn-restart" onclick="restartGame()">🔄 &nbsp;Restart</button>
  </div>
</div>

<div id="end-screen">
  <div class="end-trophy">🏆</div>
  <div class="end-title">You have done a great job!</div>
  <div class="end-sub">You know all about feelings!</div>
  <div class="end-score-box">Score: &nbsp;<span id="final-score">0</span> / 5</div>
  <div class="end-stars" id="end-stars"></div>
  <button class="btn-play-again" onclick="restartGame()">▶ &nbsp;Play Again</button>
</div>

<div id="drag-clone"></div>

<script>
/* ── EMOTIONS
   id 0–3 = tube sections (Angry at top → Happy at bottom)
   id 4   = BULB = Calm
── */
const EMOTIONS = [
  { id:0, name:'Angry',   emoji:'😡', color:'#e53935', colorLabel:'Red',    textColor:'#fff' },
  { id:1, name:'Sad',     emoji:'😢', color:'#FB8C00', colorLabel:'Orange', textColor:'#fff' },
  { id:2, name:'Worried', emoji:'😟', color:'#F9A825', colorLabel:'Yellow', textColor:'#333' },
  { id:3, name:'Happy',   emoji:'😊', color:'#43A047', colorLabel:'Green',  textColor:'#fff' },
  { id:4, name:'Calm',    emoji:'😌', color:'#1E88E5', colorLabel:'Blue',   textColor:'#fff' },
];

const TOTAL_ROUNDS = 1;
const TUBE_SECS    = 4;      // only 4 rectangular sections; id=4 is bulb

/* Sizing */
const ROW_H   = 88;
const NECK_H  = 18;
const BULB_R  = 52;
const TUBE_W  = 80;
const CALM_H  = NECK_H + BULB_R * 2 + 8;

let currentRound = 0, score = 0, muted = false;
let phase = 1;
let coloredSections = {}, placedEmojis = {};
let selectedColor   = null;
let wrongColor = {}, wrongEmoji = {};
let busy = false;

/* ── AUDIO ── */
const sndWrong = new Audio('Assets/wrong.mp3');
const sndClaps = new Audio('Assets/free_claps.mp3');

function unlockAudio() {
  [sndWrong, sndClaps].forEach(s => { s.play().catch(()=>{}); s.pause(); s.currentTime=0; });
  document.removeEventListener('pointerdown', unlockAudio);
}
document.addEventListener('pointerdown', unlockAudio);

function play(s) { if (muted) return; s.currentTime=0; s.play().catch(()=>{}); }

function speak(text) {
  sndClaps.pause(); sndClaps.currentTime=0;
  if (!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  if (muted) return;
  setTimeout(() => {
    if (muted) return;
    const u = new SpeechSynthesisUtterance(text);
    u.lang='en-US'; u.rate=0.7; u.pitch=1.0;
    const voices = window.speechSynthesis.getVoices();
    const v = voices.find(v=>v.lang.startsWith('en')&&!v.name.includes('Google'))
           || voices.find(v=>v.lang.startsWith('en')) || voices[0];
    if (v) u.voice=v;
    window.speechSynthesis.speak(u);
  }, 150);
}
window.speechSynthesis.getVoices();
window.speechSynthesis.addEventListener('voiceschanged', ()=>window.speechSynthesis.getVoices());

function playClaps() {
  if (muted) return;
  sndClaps.currentTime=0; sndClaps.play().catch(()=>{});
  setTimeout(()=>{ sndClaps.pause(); sndClaps.currentTime=0; }, 3000);
}

function toggleMute() {
  muted=!muted;
  document.getElementById('mute-btn').textContent=muted?'🔇':'🔊';
  if (muted) { window.speechSynthesis?.cancel(); sndClaps.pause(); }
  else speak(document.getElementById('question-txt').textContent);
}

function shuffle(arr) {
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

/* ── BUILD ROUND ── */
function buildRound() {
  phase=1; busy=false;
  coloredSections={}; placedEmojis={};
  selectedColor=null; wrongColor={}; wrongEmoji={};

  document.getElementById('round-num').textContent  = currentRound+1;
  document.getElementById('prog-bar').style.width   = (currentRound/TOTAL_ROUNDS*100)+'%';
  document.getElementById('score-val').textContent  = score;

  buildLabels();
  buildThermometer();
  buildCircles();
  buildColorTray();
  buildEmojiTray();

  const txt='🎨 Tap a colour, then tap the matching thermometer section!';
  document.getElementById('question-txt').textContent=txt;
  speak(txt);
}

/* LEFT LABELS */
function buildLabels() {
  const col=document.getElementById('col-labels');
  col.innerHTML='';
  EMOTIONS.forEach((e,i)=>{
    const d=document.createElement('div');
    d.className='e-label';
    d.style.height=(i<TUBE_SECS?ROW_H:CALM_H)+'px';
    d.textContent=e.name;
    col.appendChild(d);
  });
}

/* THERMOMETER SVG */
function buildThermometer() {
  const tubeH = TUBE_SECS*ROW_H;
  const SVG_W = TUBE_W+20;
  const SVG_H = tubeH+CALM_H+4;
  const cx    = SVG_W/2;
  const tubeX = (SVG_W-TUBE_W)/2;
  const bulbCY= tubeH+NECK_H+BULB_R+2;
  const neckW = Math.round(TUBE_W*0.26);

  const svg=document.getElementById('thermo-svg');
  svg.setAttribute('viewBox',`0 0 ${SVG_W} ${SVG_H}`);
  svg.setAttribute('width', SVG_W);
  svg.setAttribute('height',SVG_H);

  let s='';

  /* tube bg */
  s+=`<rect x="${tubeX}" y="0" width="${TUBE_W}" height="${tubeH}" rx="5" fill="#f2f2f2" stroke="#bbb" stroke-width="2.5"/>`;

  /* section fills + labels */
  for(let i=0;i<TUBE_SECS;i++){
    const sy=i*ROW_H, rx=i===0?4:0;
    s+=`<rect id="fill-${i}" x="${tubeX+1}" y="${sy+1}" width="${TUBE_W-2}" height="${ROW_H-1}" rx="${rx}" fill="none"/>`;
    s+=`<text id="lbl-${i}" x="${cx}" y="${sy+ROW_H/2+5}" text-anchor="middle" font-size="11" font-family="Nunito,sans-serif" font-weight="800" fill="#ccc" pointer-events="none">${EMOTIONS[i].colorLabel}</text>`;
  }

  /* dividers */
  for(let i=1;i<TUBE_SECS;i++){
    s+=`<line x1="${tubeX+2}" y1="${i*ROW_H}" x2="${tubeX+TUBE_W-2}" y2="${i*ROW_H}" stroke="#ccc" stroke-width="1.5" stroke-dasharray="6,4"/>`;
  }

  /* tube border */
  s+=`<rect x="${tubeX}" y="0" width="${TUBE_W}" height="${tubeH}" rx="5" fill="none" stroke="#999" stroke-width="2.5"/>`;

  /* neck */
  s+=`<rect id="neck-fill" x="${cx-neckW/2}" y="${tubeH-1}" width="${neckW}" height="${NECK_H+BULB_R+2}" fill="#f2f2f2"/>`;
  s+=`<line x1="${cx-neckW/2}" y1="${tubeH}" x2="${cx-neckW/2}" y2="${bulbCY-BULB_R+4}" stroke="#999" stroke-width="2.5"/>`;
  s+=`<line x1="${cx+neckW/2}" y1="${tubeH}" x2="${cx+neckW/2}" y2="${bulbCY-BULB_R+4}" stroke="#999" stroke-width="2.5"/>`;

  /* bulb fill + label + outline */
  s+=`<circle id="fill-4" cx="${cx}" cy="${bulbCY}" r="${BULB_R-1}" fill="#f2f2f2"/>`;
  s+=`<text id="lbl-4" x="${cx}" y="${bulbCY+5}" text-anchor="middle" font-size="11" font-family="Nunito,sans-serif" font-weight="800" fill="#ccc" pointer-events="none">${EMOTIONS[4].colorLabel}</text>`;
  s+=`<circle cx="${cx}" cy="${bulbCY}" r="${BULB_R}" fill="none" stroke="#999" stroke-width="2.5"/>`;

  /* hint overlay rects (gold dashed border, hidden by default) */
  for(let i=0;i<TUBE_SECS;i++){
    const sy=i*ROW_H, rx=i===0?4:0;
    s+=`<rect id="hint-sec-${i}" x="${tubeX}" y="${sy}" width="${TUBE_W}" height="${ROW_H}" rx="${rx}" fill="none" stroke="#FFD700" stroke-width="4" stroke-dasharray="10,5" opacity="0" pointer-events="none"/>`;
  }
  s+=`<circle id="hint-sec-4" cx="${cx}" cy="${bulbCY}" r="${BULB_R}" fill="none" stroke="#FFD700" stroke-width="4" stroke-dasharray="10,5" opacity="0" pointer-events="none"/>`;

  /* clickable overlays */
  for(let i=0;i<TUBE_SECS;i++){
    s+=`<rect class="t-tap" data-id="${i}" x="${tubeX}" y="${i*ROW_H}" width="${TUBE_W}" height="${ROW_H}" fill="transparent" style="cursor:pointer"/>`;
  }
  s+=`<circle class="t-tap" data-id="4" cx="${cx}" cy="${bulbCY}" r="${BULB_R}" fill="transparent" style="cursor:pointer"/>`;

  svg.innerHTML=s;
  svg.querySelectorAll('.t-tap').forEach(el=>{
    el.addEventListener('click',    ()=>onSectionTap(+el.dataset.id));
    el.addEventListener('touchend', ev=>{ev.preventDefault();onSectionTap(+el.dataset.id);});
  });
}

/* RIGHT CIRCLES */
function buildCircles() {
  const col=document.getElementById('col-circles');
  col.innerHTML='';
  EMOTIONS.forEach((e,i)=>{
    const rowH=i<TUBE_SECS?ROW_H:CALM_H;
    const size=Math.round(rowH*0.7);
    const margin=Math.round((rowH-size)/2);
    const d=document.createElement('div');
    d.className='e-circle';
    d.id=`circle-${e.id}`;
    d.dataset.id=e.id;
    d.style.cssText=`width:${size}px;height:${size}px;margin:${margin}px 4px;`;
    col.appendChild(d);
  });
}

/* COLOR SWATCHES */
function buildColorTray() {
  const tray=document.getElementById('color-tray');
  tray.innerHTML='';
  tray.style.display='flex';
  document.getElementById('emoji-tray').style.display='none';

  const size=Math.min(54,Math.floor((window.innerWidth-60)/EMOTIONS.length)-10);
  EMOTIONS.forEach(e=>{
    const sw=document.createElement('div');
    sw.className='color-swatch';
    sw.dataset.color=e.color;
    sw.dataset.id=e.id;
    sw.style.cssText=`background:${e.color};width:${size}px;height:${size}px;color:${e.textColor};`;
    sw.textContent=e.colorLabel;
    sw.addEventListener('click',()=>onColorSelect(e.color,sw));
    tray.appendChild(sw);
  });
}

/* EMOJI CARDS */
function buildEmojiTray() {
  const tray=document.getElementById('emoji-tray');
  tray.innerHTML='';
  const size=Math.min(60,Math.floor((window.innerWidth-60)/EMOTIONS.length)-10);
  shuffle([...EMOTIONS]).forEach(e=>{
    const card=document.createElement('div');
    card.className='emoji-card';
    card.dataset.id=e.id;
    card.style.cssText=`width:${size}px;height:${size}px;font-size:${Math.round(size*0.55)}px;`;
    card.textContent=e.emoji;
    setupEmojiDrag(card);
    tray.appendChild(card);
  });
}

/* ── PHASE 1: COLORING ── */
function onColorSelect(color, swEl) {
  selectedColor=color;
  document.querySelectorAll('.color-swatch').forEach(s=>s.classList.remove('selected','hint-swatch'));
  swEl.classList.add('selected');
}

function onSectionTap(id) {
  if (phase!==1||busy) return;
  if (coloredSections[id]) { showToast('✅ Already coloured!','#FF9800'); return; }
  if (!selectedColor) { showToast('👆 Pick a colour first!','#FF9800'); speak('Pick a colour first!'); return; }

  const tappedEmotion  = EMOTIONS[id];
  /* find which section the SELECTED colour actually belongs to */
  const correctEmotion = EMOTIONS.find(em => em.color === selectedColor);
  const correctId      = correctEmotion.id;

  if (selectedColor === tappedEmotion.color) {
    /* ✅ CORRECT — selected colour matches tapped section */
    coloredSections[id] = true;
    fillSection(id, correctEmotion.color, correctEmotion.textColor);
    showToast('✅ ' + correctEmotion.colorLabel + '!', '#4CAF50');
    clearHints();
    selectedColor = null;
    document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
    if (Object.keys(coloredSections).length === EMOTIONS.length) {
      playClaps(); spawnConfetti();
      setTimeout(startPhase2, 3200);
    }
  } else {
    /* ❌ WRONG — show where the selected colour actually belongs */
    if (!wrongColor[correctId]) wrongColor[correctId] = 0;
    wrongColor[correctId]++;
    play(sndWrong);
    showToast('❌ Try again!', '#f44336');

    if (wrongColor[correctId] === 1) {
      /* 1st wrong: highlight the section where selected colour belongs */
      setTimeout(() => showSectionHint(correctId), 600);
    } else {
      /* 2nd wrong: auto-fill selected colour into its correct section */
      clearHints();
      if (!coloredSections[correctId]) {
        coloredSections[correctId] = true;
        fillSection(correctId, correctEmotion.color, correctEmotion.textColor);
      }
      selectedColor = null;
      document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
      if (Object.keys(coloredSections).length === EMOTIONS.length) {
        playClaps(); spawnConfetti();
        setTimeout(startPhase2, 3200);
      }
    }
  }
}

function fillSection(id, color, textColor) {
  const fill=document.getElementById(`fill-${id}`);
  if (fill) { fill.setAttribute('fill',color); fill.style.opacity='0.85'; }
  const lbl=document.getElementById(`lbl-${id}`);
  if (lbl) lbl.setAttribute('fill',textColor==='#fff'?'rgba(255,255,255,0.8)':'rgba(0,0,0,0.4)');
  if (id===4) {
    const neck=document.getElementById('neck-fill');
    if (neck) { neck.setAttribute('fill',color); neck.style.opacity='0.85'; }
  }
}

function showSectionHint(id) {
  clearHints();
  const el = document.getElementById(`hint-sec-${id}`);
  if (el) { el.setAttribute('opacity','1'); el.classList.add('svg-hint'); }
}

function clearHints() {
  document.querySelectorAll('.e-circle').forEach(c=>c.classList.remove('hint-circle'));
  EMOTIONS.forEach(e=>{
    const el=document.getElementById(`hint-sec-${e.id}`);
    if (el) { el.setAttribute('opacity','0'); el.classList.remove('svg-hint'); }
  });
}

/* ── PHASE 2: EMOJI DRAG ── */
function startPhase2() {
  phase=2;
  const txt='😊 Now drag each emoji to the matching feeling circle!';
  document.getElementById('question-txt').textContent=txt;
  speak(txt);
  document.getElementById('color-tray').style.display='none';
  document.getElementById('emoji-tray').style.display='flex';
}

let dragId=null, dragOriginCard=null;
const dragCloneEl=document.getElementById('drag-clone');

function setupEmojiDrag(card) {
  card.addEventListener('pointerdown', e=>{
    if (phase!==2||card.classList.contains('placed')) return;
    e.preventDefault();
    dragId=+card.dataset.id;
    dragOriginCard=card;
    card.setPointerCapture(e.pointerId);
    dragCloneEl.textContent=EMOTIONS[dragId].emoji;
    dragCloneEl.style.cssText=`display:block;font-size:2.2em;left:${e.clientX}px;top:${e.clientY}px;`;
  });

  card.addEventListener('pointermove', e=>{
    if (dragId===null) return;
    dragCloneEl.style.left=e.clientX+'px';
    dragCloneEl.style.top =e.clientY+'px';
    /* hover highlight */
    document.querySelectorAll('.e-circle:not(.correct):not(.hint-circle)').forEach(c=>c.style.transform='');
    dragCloneEl.style.display='none';
    const under=document.elementFromPoint(e.clientX,e.clientY);
    dragCloneEl.style.display='block';
    const tgt=under?.closest('.e-circle');
    if (tgt&&!tgt.classList.contains('correct')) tgt.style.transform='scale(1.1)';
  });

  card.addEventListener('pointerup', e=>{
    if (dragId===null) return;
    dragCloneEl.style.display='none';
    document.querySelectorAll('.e-circle').forEach(c=>c.style.transform='');
    dragCloneEl.style.display='none';
    const under=document.elementFromPoint(e.clientX,e.clientY);
    const tgt=under?.closest('.e-circle');

    if (tgt&&!placedEmojis[+tgt.dataset.id]) {
      const cid=+tgt.dataset.id;
      const thisId=dragId; /* capture before reset at end of handler */
      if (cid===thisId) {
        /* CORRECT */
        if (!wrongEmoji[thisId]) score++;
        document.getElementById('score-val').textContent=score;
        placeEmoji(thisId, tgt);
        clearHints();
        showToast('⭐ Correct!','#4CAF50');
        if (Object.keys(placedEmojis).length===EMOTIONS.length) onRoundComplete();
      } else {
        /* WRONG */
        if (!wrongEmoji[thisId]) wrongEmoji[thisId]=0;
        wrongEmoji[thisId]++;
        play(sndWrong);
        showToast('❌ Try again!','#f44336');
        tgt.classList.add('wrong-anim');
        tgt.addEventListener('animationend',()=>tgt.classList.remove('wrong-anim'),{once:true});

        if (wrongEmoji[thisId]===1) {
          /* 1st wrong: thisId is captured — safe to use in setTimeout */
          setTimeout(()=>{
            clearHints();
            const correct=document.getElementById(`circle-${thisId}`);
            if (correct&&!placedEmojis[thisId]) correct.classList.add('hint-circle');
          }, 600);
        } else {
          /* 2nd wrong: auto-place emoji into correct circle */
          clearHints();
          const correct=document.getElementById(`circle-${thisId}`);
          if (correct&&!placedEmojis[thisId]) {
            placeEmoji(thisId, correct);
            if (Object.keys(placedEmojis).length===EMOTIONS.length) onRoundComplete();
          }
        }
      }
    }
    dragId=null; dragOriginCard=null;
  });
}

function placeEmoji(id, circleEl) {
  placedEmojis[id]=true;
  circleEl.textContent=EMOTIONS[id].emoji;
  circleEl.classList.add('correct');
  circleEl.style.borderColor=EMOTIONS[id].color;
  circleEl.style.background=hexRgba(EMOTIONS[id].color,0.15);
  const card=document.querySelector(`.emoji-card[data-id="${id}"]`);
  if (card) card.classList.add('placed');
}

function hexRgba(hex,a){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

function onRoundComplete() {
  window.speechSynthesis?.cancel();
  playClaps(); spawnConfetti(); setTimeout(spawnConfetti,600);
  currentRound++;
  if (currentRound>=TOTAL_ROUNDS) setTimeout(showEnd,3200);
  else setTimeout(buildRound, 2200);
}

function showEnd() {
  window.speechSynthesis?.cancel();
  document.getElementById('game-screen').style.display='none';
  document.getElementById('end-screen').style.display='flex';
  document.getElementById('final-score').textContent=score;
  document.getElementById('end-stars').textContent=score>=5?'⭐⭐⭐':score>=3?'⭐⭐':'⭐';
  document.getElementById('prog-bar').style.width='100%';
  playClaps(); spawnConfetti(); setTimeout(spawnConfetti,800);
}

function startGame() {
  document.getElementById('intro-screen').style.display='none';
  document.getElementById('game-screen').style.display='flex';
  currentRound=0; score=0;
  buildRound();
}

function restartGame() {
  window.speechSynthesis?.cancel();
  document.getElementById('end-screen').style.display='none';
  document.getElementById('game-screen').style.display='flex';
  currentRound=0; score=0;
  buildRound();
}

let toastTimer;
function showToast(msg,color){
  const t=document.getElementById('toast');
  t.textContent=msg; t.style.background=color;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),1400);
}

const CC=['#FFD700','#FF6B6B','#4CAF50','#2196F3','#FF9800','#AB47BC','#26C6DA'];
function spawnConfetti(){
  for(let i=0;i<70;i++){
    setTimeout(()=>{
      const el=document.createElement('div');
      el.className='confetti';
      const sz=6+Math.random()*9;
      el.style.cssText=`left:${Math.random()*100}vw;top:-12px;width:${sz}px;height:${sz}px;background:${CC[Math.floor(Math.random()*CC.length)]};border-radius:${Math.random()>.4?'50%':'2px'};animation:cfFall ${1.4+Math.random()*1.8}s linear forwards;`;
      document.body.appendChild(el);
      setTimeout(()=>el.remove(),3500);
    },i*22);
  }
}
if(!document.querySelector('#cf-style')){
  const s=document.createElement('style');s.id='cf-style';
  s.textContent=`@keyframes cfFall{0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(105vh) rotate(540deg);opacity:0}}`;
  document.head.appendChild(s);
}
</script>
</body>
