<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Odd &amp; Even &middot; LY4 &middot; Game 23</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',Arial,sans-serif;background:linear-gradient(135deg,#fce4ec 0%,#e8f5e9 50%,#e3f2fd 100%);height:100vh;height:100dvh;display:flex;align-items:stretch;justify-content:center;overflow:hidden;user-select:none;-webkit-user-select:none}

#intro-screen{position:fixed;inset:0;background:linear-gradient(160deg,#4a148c,#7b1fa2,#ab47bc);display:flex;align-items:center;justify-content:center;border:5px solid #FFD700;z-index:200;cursor:pointer}
#intro-logo{width:220px;height:auto;filter:drop-shadow(0 6px 20px rgba(0,0,0,0.5));animation:logoBounce 2s ease-in-out infinite}
@keyframes logoBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}

#game-screen{display:none;flex-direction:column;width:100%;max-width:860px;height:100%;padding:12px 14px 76px;overflow-y:auto}
.hdr{display:flex;align-items:center;justify-content:space-between;background:white;border-radius:18px;padding:10px 18px;margin-bottom:10px;box-shadow:0 4px 14px rgba(0,0,0,0.1);flex-shrink:0}
.hdr-score{font-size:1.1em;font-weight:bold;color:#4CAF50;min-width:70px}
.hdr-title{font-size:clamp(0.72em,2.4vw,0.95em);color:#6a0dad;font-weight:bold;text-align:center}
.mute-btn{width:38px;height:38px;border:2px solid #ddd;border-radius:50%;background:white;font-size:1.1em;cursor:pointer;display:flex;align-items:center;justify-content:center}

.progress-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-shrink:0}
.progress-label{font-size:0.85em;color:#777;white-space:nowrap}
.progress-bar-wrap{flex:1;height:10px;background:#e0e0e0;border-radius:5px;overflow:hidden}
.progress-bar-fill{height:100%;border-radius:5px;background:linear-gradient(90deg,#4CAF50,#8BC34A);transition:width 0.5s ease}

.question-txt{text-align:center;font-size:clamp(1em,3.5vw,1.3em);color:#333;font-weight:800;margin-bottom:8px;padding:0 6px;flex-shrink:0}
.draw-tip{text-align:center;font-size:clamp(0.8em,2.5vw,0.92em);color:#888;margin-bottom:10px;flex-shrink:0}

.scene-card{background:white;border-radius:24px;padding:18px 14px;box-shadow:0 6px 24px rgba(0,0,0,0.1);display:flex;flex-direction:column;align-items:center;gap:14px;width:100%;flex-shrink:0;margin-top:auto;margin-bottom:auto}

/* Two-image row */
.scene-wrap{position:relative;width:100%;max-width:640px;touch-action:none;border-radius:16px;overflow:hidden}
.images-row{display:flex;gap:8px;width:100%;align-items:stretch;justify-content:center;padding:8px}
.img-box{flex:1;display:flex;flex-direction:column;align-items:center}
.grp-img{width:100%;height:clamp(140px,38vw,220px);object-fit:contain;display:block;pointer-events:none;-webkit-user-drag:none}

/* Canvas covers entire scene-wrap */
#draw-canvas{position:absolute;top:0;left:0;width:100%;height:100%;cursor:crosshair;touch-action:none}

/* Divider line between the two images */
.divider{position:absolute;top:6%;bottom:6%;left:50%;width:3px;background:#e0e0e0;border-radius:2px;pointer-events:none;transform:translateX(-50%)}

/* Hint guide ring */
#hint-guide{position:absolute;border-radius:50%;border:4px dashed #FFD700;pointer-events:none;display:none;animation:hintGlowAnim 0.8s ease-in-out infinite;z-index:10;transform:translate(-50%,-50%)}
#hint-guide.show{display:block}
@keyframes hintGlowAnim{0%,100%{box-shadow:0 0 10px 3px rgba(255,215,0,0.5);border-color:#FFD700}50%{box-shadow:0 0 24px 8px rgba(255,215,0,0.9);border-color:#FFC200}}
#hint-label{display:none;position:absolute;background:#FFD700;color:#333;font-size:0.82em;font-weight:bold;padding:5px 13px;border-radius:20px;box-shadow:0 3px 10px rgba(0,0,0,0.2);white-space:nowrap;z-index:20;pointer-events:none;animation:arrowBounce 0.65s ease-in-out infinite;transform:translateX(-50%)}
#hint-label.show{display:block}
@keyframes arrowBounce{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(6px)}}

.bottom-row{display:flex;justify-content:center;position:fixed;bottom:16px;left:0;right:0;z-index:50;pointer-events:none}
.btn-restart{pointer-events:all;background:linear-gradient(135deg,#FF9800,#F57C00);color:white;border:none;padding:12px 30px;border-radius:40px;font-size:1em;font-family:inherit;font-weight:bold;cursor:pointer;box-shadow:0 5px 14px rgba(255,152,0,0.4)}

#toast{position:fixed;top:18%;left:50%;transform:translateX(-50%) scale(0.7);padding:13px 28px;border-radius:50px;font-size:1.35em;font-weight:bold;color:white;pointer-events:none;opacity:0;transition:opacity 0.2s,transform 0.2s;z-index:500;white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,0.2)}
#toast.show{opacity:1;transform:translateX(-50%) scale(1)}
.confetti{position:fixed;pointer-events:none;z-index:9998;border-radius:2px}

#end-screen{display:none;position:fixed;inset:0;background:linear-gradient(160deg,#4a148c,#7b1fa2,#ab47bc);flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:200;text-align:center;padding:30px}
.end-trophy{font-size:4.5em;animation:trophySpin 1.5s ease-out}
.end-title{color:#FFD700;font-size:clamp(1.5em,5vw,2.2em);font-weight:bold;text-shadow:0 3px 10px rgba(0,0,0,0.3)}
.end-sub{color:rgba(255,255,255,0.9);font-size:1.1em}
.end-score-box{background:rgba(255,255,255,0.15);border:2px solid rgba(255,255,255,0.35);border-radius:20px;padding:16px 40px;color:white;font-size:1.8em;font-weight:bold}
.end-stars{font-size:2.2em;letter-spacing:4px}
.btn-play-again{background:#FFD700;color:#333;border:none;padding:15px 44px;border-radius:40px;font-size:1.2em;font-family:inherit;font-weight:bold;cursor:pointer;box-shadow:0 6px 20px rgba(0,0,0,0.2);margin-top:8px}

@keyframes trophySpin{from{transform:rotate(-20deg) scale(0)}60%{transform:rotate(10deg) scale(1.1)}to{transform:rotate(0) scale(1)}}

@media(max-width:768px){
  .hdr-title{display:none}
  .scene-card{padding:14px 10px}
}
@media(max-width:480px){
  #game-screen{padding:8px 10px 72px}
  .hdr{padding:8px 12px;margin-bottom:6px}
  .scene-card{padding:10px 6px}
  .grp-img{height:clamp(120px,42vw,180px)}
  .images-row{gap:4px;padding:6px}
  .btn-restart{padding:10px 22px;font-size:0.92em}
  .question-txt{font-size:clamp(0.95em,3.5vw,1.1em);margin-bottom:6px}
  .draw-tip{margin-bottom:6px;font-size:0.78em}
}
</style>
</head>
<body>

<div id="intro-screen" onclick="startGame()">
  <img id="intro-logo" src="Assets/innovinelogo.png" alt="Innovine" onerror="this.style.display='none'">
</div>
<div id="toast"></div>

<div id="game-screen">
  <div class="hdr">
    <div class="hdr-score">&#11088; <span id="score-val">0</span> / 8</div>
    <div class="hdr-title">Odd &amp; Even &middot; LY4</div>
    <button class="mute-btn" id="mute-btn" onclick="toggleMute()">&#128266;</button>
  </div>
  <div class="progress-row">
    <span class="progress-label">Q <span id="q-num">1</span> / 8</span>
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="prog-bar" style="width:0%"></div></div>
  </div>
  <div class="question-txt" id="question-txt"></div>
  <div class="draw-tip">&#9999;&#65039; Draw a circle around the correct group!</div>
  <div class="scene-card">
    <div class="scene-wrap" id="scene-wrap">
      <div class="images-row" id="images-row">
        <div class="img-box">
          <img id="img-left" class="grp-img" src="" alt="">
        </div>
        <div class="img-box">
          <img id="img-right" class="grp-img" src="" alt="">
        </div>
      </div>
      <div class="divider"></div>
      <canvas id="draw-canvas"></canvas>
      <div id="hint-guide"></div>
      <div id="hint-label">&#9999;&#65039; Circle here!</div>
    </div>
  </div>
  <div class="bottom-row">
    <button class="btn-restart" onclick="restartGame()">&#128260; &nbsp;Restart</button>
  </div>
</div>

<div id="end-screen">
  <div class="end-trophy">&#127942;</div>
  <div class="end-title">Amazing Work!</div>
  <div class="end-sub">You know Odd &amp; Even numbers!</div>
  <div class="end-score-box">Score: &nbsp;<span id="final-score">0</span> / 8</div>
  <div class="end-stars" id="end-stars"></div>
  <button class="btn-play-again" onclick="restartGame()">&#9654; &nbsp;Play Again</button>
</div>

<script>
/* ── Questions ── */
const QUESTIONS = [
  { imgL:'Assets/3%20oranges.png',              imgR:'Assets/6oranges.png',                   numL:3, numR:6, text:'Circle the ODD group!',  correct:'left',  hintCx:0.25, hintCy:0.45 },
  { imgL:'Assets/4books.png',                   imgR:'Assets/7books.png',                     numL:4, numR:7, text:'Circle the ODD group!',  correct:'right', hintCx:0.75, hintCy:0.45 },
  { imgL:'Assets/6pencils.png',                 imgR:'Assets/1pencil.png',                    numL:6, numR:1, text:'Circle the EVEN group!', correct:'left',  hintCx:0.25, hintCy:0.45 },
  { imgL:'Assets/6pineapples.png',              imgR:'Assets/5%20pineapples.png',             numL:6, numR:5, text:'Circle the ODD group!',  correct:'right', hintCx:0.75, hintCy:0.45 },
  { imgL:'Assets/3kiwis.png',                   imgR:'Assets/2%20kiwis.png',                  numL:3, numR:2, text:'Circle the ODD group!',  correct:'left',  hintCx:0.25, hintCy:0.45 },
  { imgL:'Assets/5%20mangoes.png',              imgR:'Assets/2%20mangoes.png',                numL:5, numR:2, text:'Circle the EVEN group!', correct:'right', hintCx:0.75, hintCy:0.45 },
  { imgL:'Assets/new%20assets/strawberry.png',  imgR:'Assets/new%20assets/strawberries.png',  numL:3, numR:6, text:'Circle the ODD group!',  correct:'left',  hintCx:0.25, hintCy:0.45 },
  { imgL:'Assets/new%20assets/cupcakes.png',    imgR:'Assets/new%20assets/cupcake.png',       numL:5, numR:2, text:'Circle the EVEN group!', correct:'right', hintCx:0.75, hintCy:0.45 },
];

/* Preload */
QUESTIONS.forEach(q=>{ new Image().src=q.imgL; new Image().src=q.imgR; });

/* ── State ── */
let curQ=0, score=0, attempts=0, answered=false, muted=false;
let isDrawing=false, pathPts=[];

/* ── Audio ── */
const sndWrong=new Audio('Assets/wrong.mp3');
const sndClaps=new Audio('Assets/free_claps.mp3');
function unlockAudio(){[sndWrong,sndClaps].forEach(s=>{s.play().catch(()=>{});s.pause();s.currentTime=0});document.removeEventListener('pointerdown',unlockAudio)}
document.addEventListener('pointerdown',unlockAudio);
function play(s){if(muted)return;s.currentTime=0;s.play().catch(()=>{})}
function speak(text){
  if(!('speechSynthesis' in window)||muted)return;
  sndClaps.pause();sndClaps.currentTime=0;
  window.speechSynthesis.cancel();
  setTimeout(()=>{
    if(muted)return;
    const u=new SpeechSynthesisUtterance(text);
    u.lang='en-US';u.rate=0.7;u.pitch=1.0;
    const v=window.speechSynthesis.getVoices();
    const voice=v.find(x=>x.lang.startsWith('en')&&!x.name.includes('Google'))||v.find(x=>x.lang.startsWith('en'))||v[0];
    if(voice)u.voice=voice;
    window.speechSynthesis.speak(u);
  },150);
}
window.speechSynthesis.getVoices();
window.speechSynthesis.addEventListener('voiceschanged',()=>window.speechSynthesis.getVoices());
function playClaps(){if(muted)return;sndClaps.currentTime=0;sndClaps.play().catch(()=>{});setTimeout(()=>{sndClaps.pause();sndClaps.currentTime=0;},3000)}

/* ── Canvas helpers ── */
function cv(){return document.getElementById('draw-canvas')}
function ctx(){return cv().getContext('2d')}
function syncCanvas(){
  const wrap=document.getElementById('scene-wrap');
  const c=cv();
  const W=wrap.offsetWidth||320;
  const H=wrap.offsetHeight||200;
  c.width=W; c.height=H;
  clearCanvas();
}
function clearCanvas(){const c=cv();ctx().clearRect(0,0,c.width,c.height)}

/* ── Drawing ── */
function getXY(e){
  const r=cv().getBoundingClientRect();
  const src=e.touches?e.touches[0]:e;
  return{x:src.clientX-r.left,y:src.clientY-r.top};
}
function onDown(e){
  if(answered)return;
  e.preventDefault();
  isDrawing=true;pathPts=[];
  const p=getXY(e);pathPts.push(p);
  const c=ctx();c.beginPath();c.moveTo(p.x,p.y);
  cv().setPointerCapture(e.pointerId);
}
function onMove(e){
  if(!isDrawing||answered)return;
  e.preventDefault();
  const p=getXY(e);pathPts.push(p);
  const c=ctx();
  c.lineTo(p.x,p.y);
  c.strokeStyle='rgba(60,160,80,0.85)';c.lineWidth=7;c.lineCap='round';c.lineJoin='round';
  c.stroke();c.beginPath();c.moveTo(p.x,p.y);
}
function onUp(e){
  if(!isDrawing)return;
  isDrawing=false;
  clearCanvas();
  if(pathPts.length<5)return;
  evaluateDrawing();
}

/* ── Evaluate circle ── */
function evaluateDrawing(){
  if(pathPts.length<8)return;
  let len=0;
  for(let i=1;i<pathPts.length;i++) len+=Math.hypot(pathPts[i].x-pathPts[i-1].x,pathPts[i].y-pathPts[i-1].y);
  if(len<70)return;

  const cx=pathPts.reduce((s,p)=>s+p.x,0)/pathPts.length;
  const cy=pathPts.reduce((s,p)=>s+p.y,0)/pathPts.length;

  const angles=pathPts.map(p=>Math.atan2(p.y-cy,p.x-cx));
  const sorted=[...angles].sort((a,b)=>a-b);
  let maxGap=0;
  for(let i=1;i<sorted.length;i++) maxGap=Math.max(maxGap,sorted[i]-sorted[i-1]);
  maxGap=Math.max(maxGap,sorted[0]+Math.PI*2-sorted[sorted.length-1]);
  if(maxGap>(120*Math.PI/180))return;

  const zone=cx<cv().width/2?'left':'right';
  if(zone===QUESTIONS[curQ].correct) registerCorrect();
  else registerWrong();
}

/* ── Correct / Wrong ── */
function registerCorrect(){
  answered=true;hideHint();
  flashPath('#4CAF50',1.0,8);
  score++;document.getElementById('score-val').textContent=score;
  window.speechSynthesis?.cancel();
  playClaps();showToast('&#11088; Correct!','#4CAF50');spawnConfetti();
  setTimeout(()=>{curQ++;loadQuestion();},3200);
}
function registerWrong(){
  if(answered)return;
  attempts++;
  flashPath('#f44336',0.9,7);
  play(sndWrong);
  if(attempts===1){
    showToast('&#10060; Try again!','#f44336');
    setTimeout(()=>{clearCanvas();showHint();},800);
  } else {
    answered=true;
    showToast('&#10060; Wrong!','#f44336');
    setTimeout(()=>{
      hideHint();clearCanvas();
      drawHintCircle('#4CAF50');
      showToast('&#128161; Correct answer!','#FF9800');
      setTimeout(()=>{curQ++;loadQuestion();},3000);
    },1000);
  }
}

function flashPath(color,alpha,width){
  const c=ctx(),can=cv();
  c.clearRect(0,0,can.width,can.height);
  if(!pathPts.length)return;
  c.save();c.globalAlpha=alpha;c.strokeStyle=color;c.lineWidth=width;
  c.lineCap='round';c.lineJoin='round';c.shadowColor=color;c.shadowBlur=10;
  c.beginPath();c.moveTo(pathPts[0].x,pathPts[0].y);
  pathPts.forEach(p=>c.lineTo(p.x,p.y));
  c.stroke();c.restore();
}
function drawHintCircle(color){
  const q=QUESTIONS[curQ],can=cv(),c=ctx();
  const hx=q.hintCx*can.width, hy=q.hintCy*can.height;
  const r=Math.min(can.width/2,can.height)*0.38;
  c.save();c.strokeStyle=color;c.lineWidth=7;c.globalAlpha=0.9;
  c.shadowColor=color;c.shadowBlur=14;
  c.beginPath();c.arc(hx,hy,r,0,Math.PI*2);c.stroke();c.restore();
}

/* ── Hint ── */
function showHint(){
  const q=QUESTIONS[curQ];
  const wrap=document.getElementById('scene-wrap');
  const W=wrap.offsetWidth, H=wrap.offsetHeight;
  const r=Math.min(W/2,H)*0.38;
  const px=q.hintCx*W, py=q.hintCy*H;
  const guide=document.getElementById('hint-guide');
  guide.style.width=(r*2)+'px';guide.style.height=(r*2)+'px';
  guide.style.left=px+'px';guide.style.top=py+'px';
  guide.classList.add('show');
  const label=document.getElementById('hint-label');
  label.style.left=px+'px';
  label.style.top=Math.max(4,py-r-36)+'px';
  label.classList.add('show');
}
function hideHint(){
  document.getElementById('hint-guide').classList.remove('show');
  document.getElementById('hint-label').classList.remove('show');
}

/* ── Load question ── */
function loadQuestion(){
  if(curQ>=QUESTIONS.length){showEnd();return;}
  answered=false;attempts=0;pathPts=[];
  hideHint();

  const q=QUESTIONS[curQ];
  document.getElementById('q-num').textContent=curQ+1;
  document.getElementById('prog-bar').style.width=((curQ/8)*100)+'%';
  document.getElementById('question-txt').textContent=q.text;
  speak(q.text);

  const imgL=document.getElementById('img-left');
  const imgR=document.getElementById('img-right');
  let pending=2;
  function onLoad(){if(--pending<=0) requestAnimationFrame(()=>requestAnimationFrame(syncCanvas));}
  imgL.onload=imgL.onerror=onLoad;
  imgR.onload=imgR.onerror=onLoad;
  imgL.src=q.imgL; imgR.src=q.imgR;
  if(imgL.complete&&imgL.naturalWidth>0) onLoad();
  if(imgR.complete&&imgR.naturalWidth>0) onLoad();
}

/* ── Canvas events (set up once) ── */
function setupCanvas(){
  const c=cv();
  c.addEventListener('pointerdown',onDown);
  c.addEventListener('pointermove',onMove);
  c.addEventListener('pointerup',onUp);
  c.addEventListener('pointercancel',onUp);
  window.addEventListener('resize',()=>{syncCanvas();hideHint();});
}

/* ── Start / Restart ── */
function startGame(){
  document.getElementById('intro-screen').style.display='none';
  document.getElementById('game-screen').style.display='flex';
  curQ=0;score=0;
  document.getElementById('score-val').textContent=0;
  setupCanvas();
  loadQuestion();
}
function restartGame(){
  window.speechSynthesis?.cancel();
  document.getElementById('end-screen').style.display='none';
  document.getElementById('game-screen').style.display='flex';
  curQ=0;score=0;
  document.getElementById('score-val').textContent=0;
  loadQuestion();
}

/* ── Toast ── */
let toastTimer=null;
function showToast(msg,bg){
  const el=document.getElementById('toast');
  el.innerHTML=msg;el.style.background=bg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove('show'),1400);
}

/* ── Confetti ── */
const CC=['#FFD700','#FF6B6B','#4CAF50','#2196F3','#FF9800','#AB47BC','#26C6DA'];
function spawnConfetti(){
  for(let i=0;i<60;i++) setTimeout(()=>{
    const el=document.createElement('div');el.className='confetti';
    const sz=6+Math.random()*9;
    el.style.cssText=`left:${Math.random()*100}vw;top:-12px;width:${sz}px;height:${sz}px;background:${CC[Math.floor(Math.random()*CC.length)]};border-radius:${Math.random()>.4?'50%':'2px'};animation:cfFall ${1.4+Math.random()*1.8}s linear forwards`;
    document.body.appendChild(el);setTimeout(()=>el.remove(),3500);
  },i*22);
}
if(!document.querySelector('#cf-style')){const s=document.createElement('style');s.id='cf-style';s.textContent='@keyframes cfFall{0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(105vh) rotate(540deg);opacity:0}}';document.head.appendChild(s);}

/* ── Mute ── */
function toggleMute(){
  muted=!muted;
  document.getElementById('mute-btn').innerHTML=muted?'&#128263;':'&#128266;';
  if(muted){window.speechSynthesis?.cancel();sndClaps.pause();}
  else speak(document.getElementById('question-txt').textContent);
}

/* ── End ── */
function showEnd(){
  document.getElementById('game-screen').style.display='none';
  document.getElementById('end-screen').style.display='flex';
  document.getElementById('final-score').textContent=score;
  document.getElementById('end-stars').innerHTML=score>=7?'&#11088;&#11088;&#11088;':score>=5?'&#11088;&#11088;':'&#11088;';
  window.speechSynthesis?.cancel();
  sndClaps.currentTime=0;sndClaps.play().catch(()=>{});
  setTimeout(()=>{sndClaps.pause();sndClaps.currentTime=0;},3000);
  spawnConfetti();setTimeout(spawnConfetti,800);
}
</script>
</body>
</html>
