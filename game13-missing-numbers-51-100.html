<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Missing Numbers 51–100 · LY4</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', Arial, sans-serif;
      background: linear-gradient(135deg, #fce4ec 0%, #e8f5e9 50%, #e3f2fd 100%);
      height: 100vh; height: 100dvh;
      display: flex; align-items: stretch; justify-content: center;
      overflow: hidden; user-select: none; -webkit-user-select: none;
    }

    /* ── INTRO ── */
    #intro-screen {
      position: fixed; inset: 0;
      background: linear-gradient(160deg,#4a148c,#7b1fa2,#ab47bc);
      display: flex; align-items: center; justify-content: center;
      border: 5px solid #FFD700; z-index: 200; cursor: pointer;
    }
    #intro-logo { width:220px; filter:drop-shadow(0 6px 20px rgba(0,0,0,0.5)); animation:logoBounce 2s ease-in-out infinite; }
    @keyframes logoBounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-14px)} }

    /* ── GAME SCREEN ── */
    #game-screen {
      display:none; flex-direction:column;
      width:100%; max-width:860px;
      height:100%; padding:14px 14px 80px; overflow-y:auto;
    }
    .hdr { display:flex; align-items:center; justify-content:space-between; background:white; border-radius:18px; padding:10px 18px; margin-bottom:10px; box-shadow:0 4px 14px rgba(0,0,0,0.1); flex-shrink:0; }
    .hdr-score { font-size:1.2em; font-weight:bold; color:#4CAF50; min-width:80px; }
    .hdr-title { font-size:clamp(0.75em,2.5vw,1em); color:#6a0dad; font-weight:bold; text-align:center; }
    .mute-btn { width:38px; height:38px; border:2px solid #ddd; border-radius:50%; background:white; font-size:1.1em; cursor:pointer; display:flex; align-items:center; justify-content:center; }
    .progress-row { display:flex; align-items:center; gap:10px; margin-bottom:10px; flex-shrink:0; }
    .progress-label { font-size:0.9em; color:#777; white-space:nowrap; }
    .progress-bar-wrap { flex:1; height:10px; background:#e0e0e0; border-radius:5px; overflow:hidden; }
    .progress-bar-fill { height:100%; border-radius:5px; background:linear-gradient(90deg,#4CAF50,#8BC34A); transition:width 0.5s ease; }
    .instruction { text-align:center; font-size:clamp(0.95em,3vw,1.15em); color:#333; font-weight:700; margin-bottom:8px; padding:0 4px; flex-shrink:0; line-height:1.4; }
    .q-card { background:white; border-radius:24px; padding:22px 16px; box-shadow:0 6px 24px rgba(0,0,0,0.1); display:flex; flex-direction:column; align-items:center; gap:18px; margin-top:auto; margin-bottom:auto; flex-shrink:0; }

    /* ══════════════════════════════
       BUS  (SVG shape + HTML windows)
    ══════════════════════════════ */
    .bus-scene { width:100%; display:flex; justify-content:center; }

    .bus-container {
      position: relative;
      width: 100%;
      max-width: 580px;
    }

    .bus-svg { width:100%; height:auto; display:block; overflow:visible; }

    /* HTML windows overlay on top of the SVG */
    .bus-wins-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
    }

    .bus-win {
      position: absolute;
      /* coordinates set in JS as % of SVG viewBox */
      border-radius: 9px;
      border: 3px solid rgba(0,0,0,0.14);
      display: flex; align-items: center; justify-content: center;
      font-size: clamp(0.7em, 2.4vw, 1.25em);
      font-weight: 800;
      cursor: pointer;
      pointer-events: all;
      box-shadow: inset 0 3px 7px rgba(0,0,0,0.18), 0 1px 0 rgba(255,255,255,0.4);
    }

    /* Blank = glass-blue like real window glass */
    .bus-win.blank {
      background: linear-gradient(135deg,#BBDEFB,#90CAF9 70%,#BBDEFB);
      color: #1565C0; border-color: #64B5F6;
      font-size: clamp(0.9em, 3vw, 1.4em);
    }
    .bus-win.active-win {
      border-color: #7c3aed !important;
      animation: winPulse 1.1s ease-in-out infinite;
    }
    @keyframes winPulse {
      0%,100% { box-shadow: inset 0 3px 7px rgba(0,0,0,0.18), 0 0 0 0   rgba(124,58,237,0.6); }
      50%      { box-shadow: inset 0 3px 7px rgba(0,0,0,0.18), 0 0 0 10px rgba(124,58,237,0); }
    }
    .bus-win.done {
      background: linear-gradient(135deg,#00c9a7,#00b894) !important;
      color: #fff !important; border-color: #007a5e !important;
      animation: winPop 0.4s ease;
    }
    @keyframes winPop { 0%{transform:scale(1)} 50%{transform:scale(1.18)} 100%{transform:scale(1)} }

    /* Step label */
    .step-label { font-size:0.88em; font-weight:800; color:#6c5ce7; letter-spacing:0.04em; text-align:center; }

    /* ── CHOICES ── */
    .choices-label { font-size:0.88em; color:#aaa; font-weight:700; letter-spacing:0.05em; }
    .choices-row { display:flex; gap:14px; justify-content:center; flex-wrap:wrap; width:100%; }
    .choice-btn {
      width:80px; height:80px;
      background:linear-gradient(135deg,#6c5ce7,#a29bfe);
      border:4px solid transparent; border-radius:18px;
      display:flex; align-items:center; justify-content:center;
      font-size:1.55em; font-weight:800; color:white; cursor:pointer;
      box-shadow:0 4px 14px rgba(108,92,231,0.35);
      transition:transform 0.1s, border-color 0.2s;
    }
    .choice-btn:active { transform:scale(0.92); }
    .choice-btn.correct { border-color:#4CAF50; background:linear-gradient(135deg,#55efc4,#00b894); box-shadow:0 0 0 5px #4CAF5040; animation:btnPop 0.35s ease; }
    .choice-btn.wrong   { border-color:#f44336; background:linear-gradient(135deg,#ff7675,#d63031); animation:shakeWrong 0.4s ease; }
    .choice-btn.hint    { border-color:#FFD700; animation:pulseHint 1s ease-in-out infinite; }
    @keyframes btnPop    { 0%{transform:scale(1)} 50%{transform:scale(1.1)} 100%{transform:scale(1)} }
    @keyframes shakeWrong{ 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }
    @keyframes pulseHint { 0%,100%{box-shadow:0 0 0 0 rgba(255,215,0,0.6)} 50%{box-shadow:0 0 0 12px rgba(255,215,0,0)} }

    .btn-restart { position:fixed; bottom:16px; left:50%; transform:translateX(-50%); background:linear-gradient(135deg,#FF9800,#F57C00); color:white; border:none; border-radius:50px; padding:14px 36px; font-size:1.05em; font-family:inherit; font-weight:800; cursor:pointer; box-shadow:0 4px 16px rgba(255,152,0,0.4); z-index:50; white-space:nowrap; }

    #toast { position:fixed; top:20%; left:50%; transform:translateX(-50%) scale(0); color:white; padding:14px 28px; border-radius:50px; font-size:1.4em; font-weight:800; box-shadow:0 6px 24px rgba(0,0,0,0.25); z-index:100; transition:transform 0.2s, opacity 0.2s; opacity:0; pointer-events:none; white-space:nowrap; }
    #toast.show { transform:translateX(-50%) scale(1); opacity:1; }

    .confetti-piece { position:fixed; top:-10px; pointer-events:none; z-index:999; animation:confettiFall linear forwards; }
    @keyframes confettiFall { 0%{transform:translateY(0) rotate(0deg);opacity:1} 100%{transform:translateY(110vh) rotate(720deg);opacity:0} }

    #end-screen { display:none; position:fixed; inset:0; background:linear-gradient(160deg,#4a148c,#7b1fa2,#ab47bc); flex-direction:column; align-items:center; justify-content:center; gap:18px; z-index:150; padding:30px; }
    .end-trophy { font-size:4.5em; animation:trophySpin 1.5s ease-out; }
    @keyframes trophySpin { from{transform:rotate(-20deg) scale(0)} 60%{transform:rotate(10deg) scale(1.1)} to{transform:rotate(0deg) scale(1)} }
    .end-title { color:#FFD700; font-size:clamp(1.5em,5vw,2.2em); font-weight:bold; text-shadow:0 3px 10px rgba(0,0,0,0.3); text-align:center; }
    .end-sub   { color:rgba(255,255,255,0.9); font-size:1.1em; text-align:center; }
    .end-score-box { background:rgba(255,255,255,0.15); border-radius:16px; padding:12px 28px; color:white; font-size:1.4em; font-weight:bold; }
    .end-stars { font-size:2.2em; letter-spacing:4px; }
    .btn-play-again { background:#FFD700; color:#333; border:none; border-radius:50px; padding:14px 36px; font-size:1.1em; font-weight:800; font-family:inherit; cursor:pointer; box-shadow:0 4px 16px rgba(255,215,0,0.5); }

    @media(max-width:768px){
      #game-screen{padding:10px 10px 76px;}
      .q-card{padding:16px 10px;gap:14px;}
      .choice-btn{width:72px;height:72px;font-size:1.4em;}
      .hdr-title{display:none;}
    }
    @media(max-width:480px){
      .choice-btn{width:64px;height:64px;font-size:1.3em;border-radius:14px;}
      .choices-row{gap:10px;}
      .hdr-score{font-size:1em;}
      .instruction{font-size:clamp(0.85em,3.5vw,1em);margin-bottom:4px;}
      #game-screen{padding:8px 8px 76px;}
      .q-card{padding:12px 8px;gap:12px;border-radius:18px;}
    }
  </style>
</head>
<body>

<div id="intro-screen" onclick="startGame()">
  <img id="intro-logo" src="Assets/innovinelogo.png" alt="Innovine">
</div>
<div id="toast"></div>

<div id="game-screen">
  <div class="hdr">
    <div class="hdr-score">⭐ <span id="score-val">0</span> / 20</div>
    <div class="hdr-title">Missing Numbers 51–100</div>
    <button class="mute-btn" id="mute-btn" onclick="toggleMute()">🔊</button>
  </div>
  <div class="progress-row">
    <span class="progress-label">Q <span id="q-num">1</span> / 10</span>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="prog-bar" style="width:0%"></div>
    </div>
  </div>
  <div class="instruction" id="instruction-txt"></div>
  <div class="q-card">
    <div class="bus-scene" id="bus-scene"></div>
    <div class="step-label" id="step-label"></div>
    <div class="choices-label">Pick the missing number</div>
    <div class="choices-row" id="choices-row"></div>
  </div>
  <button class="btn-restart" onclick="restartGame()">🔄 &nbsp;Restart</button>
</div>

<div id="end-screen">
  <div class="end-trophy">🏆</div>
  <div class="end-title">You have done a great job!</div>
  <div class="end-sub">You completed all 10 questions!</div>
  <div class="end-score-box">Score: &nbsp;<span id="final-score">0</span> / 20</div>
  <div class="end-stars" id="end-stars"></div>
  <button class="btn-play-again" onclick="restartGame()">▶ &nbsp;Play Again</button>
</div>

<script>
const WIN_COLORS = [
  { bg:'#EF5350', text:'#fff' },
  { bg:'#FFD93D', text:'#333' },
  { bg:'#26C281', text:'#fff' },
  { bg:'#42A5F5', text:'#fff' },
  { bg:'#FF7043', text:'#fff' },
];

const QUESTIONS = [
  { sequence:[51,null,53,null,55], answers:[52,54], choices:[[52,50,56,59],[54,57,60,50]] },
  { sequence:[56,57,null,59,null], answers:[58,60], choices:[[58,55,61,64],[60,63,54,65]] },
  { sequence:[null,62,null,64,65], answers:[61,63], choices:[[61,58,67,70],[63,60,66,69]] },
  { sequence:[66,67,null,69,null], answers:[68,70], choices:[[68,65,71,74],[70,73,75,63]] },
  { sequence:[null,72,73,null,75], answers:[71,74], choices:[[71,68,76,79],[74,77,70,67]] },
  { sequence:[76,null,78,79,null], answers:[77,80], choices:[[77,74,81,84],[80,83,85,73]] },
  { sequence:[null,82,83,null,85], answers:[81,84], choices:[[81,78,87,90],[84,87,80,77]] },
  { sequence:[86,87,null,null,90], answers:[88,89], choices:[[88,85,91,94],[89,92,85,95]] },
  { sequence:[91,null,93,94,null], answers:[92,95], choices:[[92,89,96,99],[95,98,89,88]] },
  { sequence:[96,null,98,null,100],answers:[97,99], choices:[[97,94,91,88],[99,96,93,90]] },
];

const sndCorrect = new Audio('Assets/correct.mp3');
const sndWrong   = new Audio('Assets/wrong.mp3');
const sndClaps   = new Audio('Assets/free_claps.mp3');

/* Unlock audio on first touch — bypasses browser autoplay block */
function unlockAudio() {
  [sndCorrect, sndWrong, sndClaps].forEach(s => { s.play().catch(()=>{}); s.pause(); s.currentTime = 0; });
  document.removeEventListener('pointerdown', unlockAudio);
}
document.addEventListener('pointerdown', unlockAudio);

let curQ=0, score=0, muted=false, attempts=0, currentBlank=0, blankLocked=false;

function getVoice(){const v=window.speechSynthesis.getVoices();return v.find(x=>x.lang.startsWith('en')&&!x.name.includes('Google'))||v.find(x=>x.lang.startsWith('en'))||v[0];}
function speak(text){if(!('speechSynthesis'in window)||muted)return;window.speechSynthesis.cancel();setTimeout(()=>{if(muted)return;const u=new SpeechSynthesisUtterance(text);u.lang='en-US';u.rate=0.7;const v=getVoice();if(v)u.voice=v;window.speechSynthesis.speak(u);},150);}

window.speechSynthesis.getVoices();
window.speechSynthesis.addEventListener('voiceschanged',()=>window.speechSynthesis.getVoices());
function playClaps(){if(muted)return;sndClaps.currentTime=0;sndClaps.play().catch(()=>{});setTimeout(()=>{sndClaps.pause();sndClaps.currentTime=0;},3000);}
function play(s){if(muted)return;s.currentTime=0;s.play().catch(()=>{});}
function missingIdxsOf(q){return q.sequence.reduce((a,v,i)=>{if(v===null)a.push(i);return a;},[]);}
function getChoiceBtn(val){return document.querySelector(`.choice-btn[data-val="${val}"]`);}
function clearChoiceStates(){document.querySelectorAll('.choice-btn').forEach(b=>b.classList.remove('correct','wrong','hint'));}

/* ──────────────────────────────────────────────────
   BUILD BUS
   SVG viewBox: 0 0 560 136
   Cab: x=22–112  |  Windows area: x=116–540  |  Rear: x=540–552
   Roof stripe: y=4–18  |  Windows: y=19–75  |  Red stripe: y=77–89
   Wheels: cx=88,462  cy=113  r=22
   ────────────────────────────────────────────────── */
const BUS_SVG = `
<svg class="bus-svg" viewBox="0 0 560 136" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="wsG11" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#E3F2FD" stop-opacity="0.9"/>
      <stop offset="55%"  stop-color="#90CAF9"/>
      <stop offset="100%" stop-color="#BBDEFB" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="bodyG11" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#FFE030"/>
      <stop offset="100%" stop-color="#FFC800"/>
    </linearGradient>
    <linearGradient id="cabG11" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#CC6000"/>
      <stop offset="100%" stop-color="#F08000"/>
    </linearGradient>
  </defs>

  <!-- Ground shadow -->
  <ellipse cx="295" cy="133" rx="240" ry="5" fill="rgba(0,0,0,0.13)"/>

  <!-- ── MAIN BUS BODY ── -->
  <rect x="22" y="4" width="530" height="90" rx="12" fill="url(#bodyG11)" stroke="#BB7700" stroke-width="3"/>

  <!-- ── DARK RED ROOF STRIPE ── -->
  <rect x="22" y="4" width="530" height="16" rx="12" fill="#7A0000"/>
  <rect x="30" y="4" width="514" height="10" rx="7" fill="#B71C1C"/>

  <!-- ── CAB / FRONT SECTION ── -->
  <!-- Amber cab background (clips to bus body corners on left) -->
  <rect x="22" y="4"  width="91" height="90" rx="12" fill="url(#cabG11)"/>
  <!-- Remove extra rounding on the RIGHT side of cab -->
  <rect x="72" y="4"  width="41" height="90" fill="#E07800"/>
  <!-- Re-apply roof tint over cab -->
  <rect x="22" y="4"  width="91" height="16" rx="12" fill="#882200" opacity="0.7"/>
  <rect x="64" y="4"  width="49" height="16" fill="#882200" opacity="0.7"/>
  <!-- Cab divider line -->
  <line x1="113" y1="4" x2="113" y2="94" stroke="#BB7700" stroke-width="3"/>

  <!-- ── WINDSHIELD (large, fills most of cab face) ── -->
  <rect x="28" y="19" width="78" height="52" rx="7" fill="url(#wsG11)" stroke="#1565C0" stroke-width="2.5"/>
  <!-- Windshield glare streak -->
  <rect x="34" y="24" width="26" height="11" rx="5" fill="rgba(255,255,255,0.52)" transform="rotate(-14 47 30)"/>
  <!-- Windshield center divider (wiper park line) -->
  <line x1="67" y1="67" x2="67" y2="72" stroke="#1565C0" stroke-width="1.5" opacity="0.5"/>

  <!-- ── SIDE MIRROR ── -->
  <line x1="22" y1="29" x2="6"  y2="26" stroke="#AA5500" stroke-width="2.5"/>
  <rect x="2"  y="19" width="18" height="14" rx="4" fill="#FF9800" stroke="#CC7000" stroke-width="2"/>
  <!-- Mirror glass -->
  <rect x="4"  y="21" width="14" height="10" rx="3" fill="#B3E5FC" opacity="0.8"/>

  <!-- ── HEADLIGHTS (two, side by side at bottom of cab) ── -->
  <rect x="26" y="77" width="28" height="13" rx="4" fill="#FFFDE7" stroke="#CC8800" stroke-width="1.5"/>
  <rect x="58" y="77" width="28" height="13" rx="4" fill="#FFFDE7" stroke="#CC8800" stroke-width="1.5"/>
  <!-- Headlight glare dots -->
  <circle cx="37" cy="82" r="4" fill="rgba(255,255,255,0.7)"/>
  <circle cx="69" cy="82" r="4" fill="rgba(255,255,255,0.7)"/>

  <!-- ── DOOR (right side of cab, partial view) ── -->
  <rect x="91" y="44" width="20" height="48" rx="3" fill="rgba(0,0,0,0.07)" stroke="#AA5500" stroke-width="1.5"/>
  <!-- Door handle -->
  <rect x="94" y="64" width="12" height="4" rx="2" fill="#AA5500"/>

  <!-- ── FRONT BUMPER ── -->
  <rect x="24" y="88" width="89" height="6" rx="3" fill="#884400"/>
  <!-- Bumper bolts -->
  <circle cx="35" cy="91" r="2.5" fill="#663300"/>
  <circle cx="100" cy="91" r="2.5" fill="#663300"/>

  <!-- ── RED STRIPE (below windows, full body width) ── -->
  <rect x="113" y="77" width="437" height="12" fill="#C62828"/>
  <!-- Cab bottom matches -->
  <rect x="22"  y="77" width="91" height="12" fill="#7A2200" rx="0"/>

  <!-- ── TAILLIGHT ── -->
  <rect x="547" y="25" width="5" height="48" rx="3" fill="#E53935" stroke="#8B0000" stroke-width="1.5"/>

  <!-- ── FRONT WHEEL ── -->
  <circle cx="88"  cy="113" r="22" fill="#1C1C1C" stroke="#0a0a0a" stroke-width="3"/>
  <circle cx="88"  cy="113" r="13" fill="#C62828" stroke="#8B0000" stroke-width="2"/>
  <circle cx="88"  cy="113" r="5"  fill="#7F0000"/>
  <!-- Lug nut spokes -->
  <line x1="88" y1="101" x2="88" y2="107" stroke="#8B0000" stroke-width="2"/>
  <line x1="88" y1="119" x2="88" y2="125" stroke="#8B0000" stroke-width="2"/>
  <line x1="76" y1="113" x2="82" y2="113" stroke="#8B0000" stroke-width="2"/>
  <line x1="94" y1="113" x2="100" y2="113" stroke="#8B0000" stroke-width="2"/>

  <!-- ── REAR WHEEL ── -->
  <circle cx="462" cy="113" r="22" fill="#1C1C1C" stroke="#0a0a0a" stroke-width="3"/>
  <circle cx="462" cy="113" r="13" fill="#C62828" stroke="#8B0000" stroke-width="2"/>
  <circle cx="462" cy="113" r="5"  fill="#7F0000"/>
  <line x1="462" y1="101" x2="462" y2="107" stroke="#8B0000" stroke-width="2"/>
  <line x1="462" y1="119" x2="462" y2="125" stroke="#8B0000" stroke-width="2"/>
  <line x1="450" y1="113" x2="456" y2="113" stroke="#8B0000" stroke-width="2"/>
  <line x1="468" y1="113" x2="474" y2="113" stroke="#8B0000" stroke-width="2"/>
</svg>`;

/*
  Window positions as % of SVG viewBox (560 × 136):
  Windows area x: 118–540, y: 19–75
  5 windows, width≈80, height≈56, gap≈6
  x positions: 118, 204, 290, 376, 462
  As %: left = x/560, top = 19/136 = 14%, width = 80/560 = 14.3%, height = 56/136 = 41.2%
*/
const WIN_LEFT_PCT  = [21.1, 36.4, 51.8, 67.1, 82.5]; /* x/560 */
const WIN_TOP_PCT   = 14;      /* 19/136  */
const WIN_WIDTH_PCT = 14.3;    /* 80/560  */
const WIN_HEIGHT_PCT= 41.2;    /* 56/136  */

function buildBus(q) {
  const scene = document.getElementById('bus-scene');
  scene.innerHTML = '';
  const blanks = missingIdxsOf(q);

  const container = document.createElement('div');
  container.className = 'bus-container';
  container.innerHTML = BUS_SVG;

  /* Overlay for interactive windows */
  const overlay = document.createElement('div');
  overlay.className = 'bus-wins-overlay';

  q.sequence.forEach((num, i) => {
    const isBlank  = num === null;
    const isActive = isBlank && blanks.indexOf(i) === currentBlank;
    const win = document.createElement('div');
    win.className = 'bus-win'; win.id = 'win-' + i;
    win.style.left   = WIN_LEFT_PCT[i]  + '%';
    win.style.top    = WIN_TOP_PCT       + '%';
    win.style.width  = WIN_WIDTH_PCT     + '%';
    win.style.height = WIN_HEIGHT_PCT    + '%';

    if (isBlank) {
      win.classList.add('blank');
      if (isActive) win.classList.add('active-win');
      win.textContent = '?';
    } else {
      const c = WIN_COLORS[i % WIN_COLORS.length];
      win.style.background = c.bg; win.style.color = c.text;
      win.textContent = num;
    }
    overlay.appendChild(win);
  });

  container.appendChild(overlay);
  scene.appendChild(container);
}

function fillWindow(seqIdx, val) {
  const win = document.getElementById('win-' + seqIdx);
  if (!win) return;
  win.classList.remove('blank','active-win'); win.classList.add('done');
  win.textContent = val; win.style.background=''; win.style.color='';
}
function activateWindow(blanks){
  const win = document.getElementById('win-' + blanks[currentBlank]);
  if (win) win.classList.add('active-win');
}

function buildChoices(choices){
  const row=document.getElementById('choices-row'); row.innerHTML='';
  [...choices].sort(()=>Math.random()-0.5).forEach(n=>{
    const btn=document.createElement('div'); btn.className='choice-btn';
    btn.dataset.val=n; btn.textContent=n; btn.onclick=()=>selectChoice(n);
    row.appendChild(btn);
  });
}

function startGame(){
  document.getElementById('intro-screen').style.display='none';
  document.getElementById('game-screen').style.display='flex';
  curQ=0;score=0;loadQuestion();
}

function loadQuestion(){
  if(curQ>=10){showEnd();return;}
  sndClaps.pause(); sndClaps.currentTime=0;   /* stop any lingering claps before TTS */
  currentBlank=0;blankLocked=false;attempts=0;clearChoiceStates();
  const q=QUESTIONS[curQ];
  document.getElementById('q-num').textContent=curQ+1;
  document.getElementById('score-val').textContent=score;
  document.getElementById('prog-bar').style.width=(curQ/10*100)+'%';
  document.getElementById('instruction-txt').textContent='Find the missing numbers!';
  document.getElementById('step-label').textContent='→ Fill the 1st missing number';
  buildBus(q); buildChoices(q.choices[0]);
  speak('Find the missing numbers! Find the first missing number.');
}

function selectChoice(val){
  if(blankLocked)return;
  const q=QUESTIONS[curQ];
  if(val===q.answers[currentBlank]) registerCorrect(val); else registerWrong(val);
}

function registerCorrect(val){
  blankLocked=true;
  const q=QUESTIONS[curQ],blanks=missingIdxsOf(q);
  clearChoiceStates();
  fillWindow(blanks[currentBlank],val);
  getChoiceBtn(val).classList.add('correct');
  score++;document.getElementById('score-val').textContent=score;
  if(currentBlank===0){
    /* Cancel any running TTS, then start 1.5 s clap burst (no correct.mp3 overlap) */
    window.speechSynthesis?.cancel();
    showToast('⭐ Correct!','#4CAF50');
    spawnConfetti();
    if(!muted){sndClaps.currentTime=0;sndClaps.play().catch(()=>{});}
    setTimeout(()=>{
      sndClaps.pause(); sndClaps.currentTime=0;
      clearChoiceStates();currentBlank=1;attempts=0;blankLocked=false;
      activateWindow(blanks);
      document.getElementById('instruction-txt').textContent='Great! Now find the 2nd missing number!';
      document.getElementById('step-label').textContent='→ Fill the 2nd missing number';
      speak('Find the 2nd missing number!');
      buildChoices(q.choices[1]);
    },1500);
  }else{
    /* Full clap + confetti when both blanks done — correct.mp3 plays briefly then claps take over */
    play(sndCorrect);
    setTimeout(()=>{
      sndCorrect.pause();sndCorrect.currentTime=0;
      clearChoiceStates();window.speechSynthesis?.cancel();
      playClaps();showToast('⭐ Correct!','#4CAF50');spawnConfetti();
      setTimeout(nextQuestion,3200);
    },400);
  }
}

function registerWrong(val){
  attempts++;play(sndWrong);
  const q=QUESTIONS[curQ],correct=q.answers[currentBlank],blanks=missingIdxsOf(q);
  if(attempts===1){
    showToast('❌ Try again!','#f44336');
    const w=getChoiceBtn(val);w.classList.add('wrong');getChoiceBtn(correct).classList.add('hint');
    setTimeout(()=>{w.classList.remove('wrong');hideToast();},900);
  }else{
    blankLocked=true;getChoiceBtn(val).classList.add('wrong');
    setTimeout(()=>{
      showToast('💡 Correct answer!','#FF9800');clearChoiceStates();
      getChoiceBtn(correct).classList.add('correct');fillWindow(blanks[currentBlank],correct);
      if(currentBlank===0){
        setTimeout(()=>{
          clearChoiceStates();currentBlank=1;attempts=0;blankLocked=false;
          activateWindow(blanks);
          document.getElementById('instruction-txt').textContent='Now find the 2nd missing number!';
          document.getElementById('step-label').textContent='→ Fill the 2nd missing number';
          speak('Find the 2nd missing number!');buildChoices(q.choices[1]);
        },1600);
      }else{setTimeout(nextQuestion,2800);}
    },1000);
  }
}

function nextQuestion(){clearChoiceStates();curQ++;loadQuestion();}
function showToast(msg,color){const t=document.getElementById('toast');t.textContent=msg;t.style.background=color;t.classList.add('show');setTimeout(hideToast,1800);}
function hideToast(){document.getElementById('toast').classList.remove('show');}
function spawnConfetti(){
  const c=['#FF6B6B','#FFD93D','#6BCB77','#4D96FF','#FF922B','#cc5de8'];
  for(let i=0;i<60;i++){
    const p=document.createElement('div');p.className='confetti-piece';
    p.style.cssText=`left:${Math.random()*100}vw;background:${c[~~(Math.random()*c.length)]};width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${1.5+Math.random()*2}s;animation-delay:${Math.random()*.8}s;`;
    document.body.appendChild(p);p.addEventListener('animationend',()=>p.remove());
  }
}
function toggleMute(){
  muted=!muted;document.getElementById('mute-btn').textContent=muted?'🔇':'🔊';
  if(muted){window.speechSynthesis?.cancel();sndClaps.pause();}
  else speak(document.getElementById('instruction-txt').textContent);
}
function showEnd(){
  document.getElementById('game-screen').style.display='none';
  document.getElementById('end-screen').style.display='flex';
  document.getElementById('final-score').textContent=score;
  document.getElementById('end-stars').textContent=score>=18?'⭐⭐⭐':score>=14?'⭐⭐':'⭐';
  window.speechSynthesis?.cancel();playClaps();spawnConfetti();setTimeout(spawnConfetti,800);
}
function restartGame(){
  clearChoiceStates();window.speechSynthesis?.cancel();
  document.getElementById('end-screen').style.display='none';
  document.getElementById('game-screen').style.display='flex';
  curQ=0;score=0;currentBlank=0;blankLocked=false;attempts=0;loadQuestion();
}
</script>
</body>
</html>
