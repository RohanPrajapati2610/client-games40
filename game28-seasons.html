<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Seasons · LY4 · Game 28</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', 'Trebuchet MS', Arial, sans-serif;
      background: linear-gradient(135deg, #fce4ec 0%, #e8f5e9 50%, #e3f2fd 100%);
      height: 100vh; height: 100dvh;
      display: flex; align-items: stretch; justify-content: center;
      overflow: hidden; user-select: none; -webkit-user-select: none;
    }

    #intro-screen {
      position: fixed; inset: 0;
      background: linear-gradient(160deg, #4a148c, #7b1fa2, #ab47bc);
      display: flex; align-items: center; justify-content: center;
      border: 5px solid #FFD700; z-index: 200; cursor: pointer;
    }
    #intro-logo { width: 220px; height: auto; filter: drop-shadow(0 6px 20px rgba(0,0,0,0.5)); animation: logoBounce 2s ease-in-out infinite; }
    @keyframes logoBounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }

    #game-screen {
      display: none; flex-direction: column;
      width: 100%; max-width: 860px; height: 100%;
      padding: 14px 14px 80px; overflow-y: auto;
    }

    .hdr { display:flex; align-items:center; justify-content:space-between; background:white; border-radius:18px; padding:10px 18px; margin-bottom:10px; box-shadow:0 4px 14px rgba(0,0,0,0.1); flex-shrink:0; }
    .hdr-score { font-size:1.2em; font-weight:bold; color:#4CAF50; min-width:70px; }
    .hdr-title { font-size:clamp(0.75em,2.5vw,1em); color:#6a0dad; font-weight:bold; text-align:center; }
    .mute-btn { width:38px; height:38px; border:2px solid #ddd; border-radius:50%; background:white; font-size:1.1em; cursor:pointer; display:flex; align-items:center; justify-content:center; }

    .progress-row { display:flex; align-items:center; gap:10px; margin-bottom:10px; flex-shrink:0; }
    .progress-label { font-size:0.9em; color:#777; white-space:nowrap; }
    .progress-bar-wrap { flex:1; height:10px; background:#e0e0e0; border-radius:5px; overflow:hidden; }
    .progress-bar-fill { height:100%; border-radius:5px; background:linear-gradient(90deg,#4CAF50,#8BC34A); transition:width 0.5s ease; }

    .instruction { text-align:center; font-size:clamp(1em,3.5vw,1.2em); color:#333; font-weight:800; margin-bottom:10px; padding:0 8px; line-height:1.4; flex-shrink:0; }

    .q-card {
      background: white; border-radius: 24px;
      box-shadow: 0 6px 24px rgba(0,0,0,0.1);
      display: flex; flex-direction: column; align-items: center; gap: 16px;
      margin-top: auto; margin-bottom: auto; flex-shrink: 0; width: 100%;
      overflow: hidden; padding-bottom: 20px;
    }

    .scene-img-wrap {
      width: 100%; height: 260px; border-radius: 20px 20px 0 0;
      background: #f0f4f8; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; overflow: hidden;
    }
    .scene-img-wrap img {
      max-width: 100%; max-height: 100%; object-fit: contain;
      transition: opacity 0.35s ease;
    }

    .season-choices { display:flex; gap:10px; width:100%; padding: 0 16px; }

    .season-btn {
      flex: 1; height: 78px;
      border: 4px solid transparent; border-radius: 18px;
      font-size: clamp(0.8em, 2.5vw, 1em); font-weight: 800; font-family: inherit;
      cursor: pointer; color: white;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 3px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.2);
      transition: transform 0.1s, border-color 0.2s, box-shadow 0.2s;
    }
    .season-btn .btn-icon { font-size: 1.5em; line-height: 1; }
    .season-btn:active { transform: scale(0.93); }

    .btn-summer { background: linear-gradient(135deg, #E65100, #FFB300); }
    .btn-winter  { background: linear-gradient(135deg, #0D47A1, #42A5F5); }
    .btn-rainy   { background: linear-gradient(135deg, #263238, #607D8B); }
    .btn-spring  { background: linear-gradient(135deg, #1B5E20, #66BB6A); }

    .season-btn.correct { border-color: #4CAF50; box-shadow: 0 0 0 5px #4CAF5040; animation: popCorrect 0.35s ease; }
    .season-btn.wrong   { border-color: #f44336; animation: shakeWrong 0.4s ease; }
    .season-btn.hint    { border-color: #FFD700; animation: pulseHint 1s ease-in-out infinite; }

    @keyframes popCorrect { 0%{transform:scale(1)} 50%{transform:scale(1.08)} 100%{transform:scale(1)} }
    @keyframes shakeWrong { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }
    @keyframes pulseHint  { 0%,100%{box-shadow:0 0 0 0 rgba(255,215,0,0.6)} 50%{box-shadow:0 0 0 14px rgba(255,215,0,0)} }

    .bottom-row { display:flex; justify-content:center; position:fixed; bottom:16px; left:0; right:0; z-index:50; pointer-events:none; }
    .btn-restart { pointer-events:all; background:linear-gradient(135deg,#FF9800,#F57C00); color:white; border:none; padding:12px 32px; border-radius:40px; font-size:1em; font-family:inherit; font-weight:bold; cursor:pointer; box-shadow:0 5px 14px rgba(255,152,0,0.4); }

    #toast { position:fixed; top:18%; left:50%; transform:translateX(-50%) scale(0.7); padding:14px 30px; border-radius:50px; font-size:1.5em; font-weight:bold; color:white; pointer-events:none; opacity:0; transition:opacity 0.2s,transform 0.2s; z-index:500; white-space:nowrap; box-shadow:0 8px 24px rgba(0,0,0,0.2); }
    #toast.show { opacity:1; transform:translateX(-50%) scale(1); }

    .confetti { position:fixed; pointer-events:none; z-index:9998; border-radius:2px; }
    .emoji-burst { position:fixed; pointer-events:none; z-index:9999; font-size:2em; line-height:1; animation:burstFly 1.2s ease-out forwards; }
    @keyframes burstFly { 0%{opacity:1;transform:translate(0,0) scale(1.2)} 100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(0.4)} }

    #end-screen { display:none; position:fixed; inset:0; background:linear-gradient(160deg,#4a148c,#7b1fa2,#ab47bc); flex-direction:column; align-items:center; justify-content:center; gap:16px; z-index:200; text-align:center; padding:30px; }
    .end-trophy { font-size:4.5em; animation:trophySpin 1.5s ease-out; }
    @keyframes trophySpin { from{transform:rotate(-20deg) scale(0)} 60%{transform:rotate(10deg) scale(1.1)} to{transform:rotate(0) scale(1)} }
    .end-title  { color:#FFD700; font-size:clamp(1.5em,5vw,2.2em); font-weight:bold; text-shadow:0 3px 10px rgba(0,0,0,0.3); }
    .end-sub    { color:rgba(255,255,255,0.9); font-size:1.1em; }
    .end-score-box { background:rgba(255,255,255,0.15); border:2px solid rgba(255,255,255,0.35); border-radius:20px; padding:16px 40px; color:white; font-size:1.8em; font-weight:bold; }
    .end-stars  { font-size:2.2em; letter-spacing:4px; }
    .btn-play-again { background:#FFD700; color:#333; border:none; padding:15px 45px; border-radius:40px; font-size:1.2em; font-family:inherit; font-weight:bold; cursor:pointer; box-shadow:0 6px 20px rgba(0,0,0,0.2); margin-top:8px; }

    @media (max-width: 768px) {
      #game-screen { padding: 10px 10px 76px; }
      .hdr-title { display: none; }
      .scene-img-wrap { height: 220px; }
      .season-btn { height: 68px; }
    }
    @media (max-width: 480px) {
      .season-choices { gap: 8px; padding: 0 10px; }
      .season-btn { height: 60px; border-radius: 14px; border-width: 3px; }
      .season-btn .btn-icon { font-size: 1.2em; }
      .scene-img-wrap { height: 190px; }
    }
  </style>
</head>
<body>

<div id="intro-screen" onclick="startGame()">
  <img id="intro-logo" src="Assets/innovinelogo.png" alt="Innovine" onerror="this.style.display='none'">
</div>

<div id="toast"></div>

<div id="game-screen">
  <div class="hdr">
    <div class="hdr-score">⭐ <span id="score-val">0</span> / 8</div>
    <div class="hdr-title">Seasons</div>
    <button class="mute-btn" id="mute-btn" onclick="toggleMute()">🔊</button>
  </div>
  <div class="progress-row">
    <span class="progress-label">Q <span id="q-num">1</span> / 8</span>
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="prog-bar" style="width:0%"></div></div>
  </div>
  <div class="instruction">Which season is this? 🤔</div>
  <div class="q-card">
    <div class="scene-img-wrap">
      <img id="scene-img" src="" alt="season scene" decoding="async">
    </div>
    <div class="season-choices" id="season-choices"></div>
  </div>
  <div class="bottom-row">
    <button class="btn-restart" onclick="restartGame()">🔄 &nbsp;Restart</button>
  </div>
</div>

<div id="end-screen">
  <div class="end-trophy">🏆</div>
  <div class="end-title">Amazing! You did it!</div>
  <div class="end-sub">You identified all 8 seasons!</div>
  <div class="end-score-box">Score: &nbsp;<span id="final-score">0</span> / 8</div>
  <div class="end-stars" id="end-stars"></div>
  <button class="btn-play-again" onclick="restartGame()">▶ &nbsp;Play Again</button>
</div>

<script>
const SEASONS = {
  Summer: { emoji: '☀️', cls: 'btn-summer', confetti: ['#FFD700','#FF8F00','#FFCC02','#FFA000','#FF6D00'] },
  Winter: { emoji: '❄️', cls: 'btn-winter',  confetti: ['#E3F2FD','#90CAF9','#42A5F5','#ffffff','#BBDEFB'] },
  Rainy:  { emoji: '🌧️', cls: 'btn-rainy',   confetti: ['#546E7A','#90A4AE','#B0BEC5','#4FC3F7','#80DEEA'] },
  Spring: { emoji: '🌸', cls: 'btn-spring',  confetti: ['#A5D6A7','#F48FB1','#CE93D8','#80CBC4','#FFCC80'] },
};

const ALL_QUESTIONS = [
  { img: 'Assets/summer1.png', season: 'Summer' },
  { img: 'Assets/summer2.png', season: 'Summer' },
  { img: 'Assets/winter1.png', season: 'Winter' },
  { img: 'Assets/winter2.png', season: 'Winter' },
  { img: 'Assets/rainy1.png',  season: 'Rainy'  },
  { img: 'Assets/rainy2.png',  season: 'Rainy'  },
  { img: 'Assets/spring1.png', season: 'Spring' },
  { img: 'Assets/spring2.png', season: 'Spring' },
];

ALL_QUESTIONS.forEach(q => {
  const i = new Image();
  i.src = q.img;
  i.decode?.().catch(() => {});
});

function shuffleNoConsecutive(arr) {
  let result, tries = 0;
  do {
    result = [...arr];
    for (let i = result.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [result[i], result[j]] = [result[j], result[i]];
    }
    tries++;
  } while (tries < 200 && result.some((q, i) => i > 0 && q.season === result[i - 1].season));
  return result;
}

let QUESTIONS = [];
let curQ = 0, score = 0, attempts = 0, answered = false, muted = false;

const sndWrong = new Audio('Assets/wrong.mp3');
const sndClaps = new Audio('Assets/free_claps.mp3');

function unlockAudio() {
  [sndWrong, sndClaps].forEach(s => { s.play().catch(() => {}); s.pause(); s.currentTime = 0; });
  document.removeEventListener('pointerdown', unlockAudio);
}
document.addEventListener('pointerdown', unlockAudio);

function play(s) { if (muted) return; window.speechSynthesis?.cancel(); s.currentTime = 0; s.play().catch(() => {}); }

function speak(text) {
  sndClaps.pause(); sndClaps.currentTime = 0;
  if (!('speechSynthesis' in window) || muted) return;
  window.speechSynthesis.cancel();
  setTimeout(() => {
    if (muted) return;
    window.speechSynthesis.resume();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'en-US'; u.rate = 0.7; u.pitch = 1.0;
    const voices = window.speechSynthesis.getVoices();
    const v = voices.find(v => v.lang.startsWith('en') && !v.name.includes('Google'))
           || voices.find(v => v.lang.startsWith('en')) || voices[0];
    if (v) u.voice = v;
    window.speechSynthesis.speak(u);
  }, 150);
}
window.speechSynthesis.getVoices();
window.speechSynthesis.addEventListener('voiceschanged', () => window.speechSynthesis.getVoices());

function playClaps() {
  if (muted) return;
  sndClaps.currentTime = 0; sndClaps.play().catch(() => {});
  setTimeout(() => { sndClaps.pause(); sndClaps.currentTime = 0; }, 3000);
}

function loadQuestion() {
  if (curQ >= QUESTIONS.length) { showEnd(); return; }
  answered = false; attempts = 0;

  const q = QUESTIONS[curQ];
  document.getElementById('q-num').textContent     = curQ + 1;
  document.getElementById('score-val').textContent = score;
  document.getElementById('prog-bar').style.width  = (curQ / QUESTIONS.length * 100) + '%';

  const img = document.getElementById('scene-img');
  img.style.opacity = '0';
  img.src = q.img;
  img.onload = () => { img.style.opacity = '1'; };

  speak('Which season is this?');
  buildButtons();
}

function buildButtons() {
  const wrap = document.getElementById('season-choices');
  wrap.innerHTML = '';
  Object.entries(SEASONS).forEach(([name, data]) => {
    const btn = document.createElement('button');
    btn.className = `season-btn ${data.cls}`;
    btn.dataset.season = name;
    btn.innerHTML = `<span class="btn-icon">${data.emoji}</span><span>${name}</span>`;
    btn.onclick = () => selectSeason(name);
    wrap.appendChild(btn);
  });
}

function clearBtnStates() {
  document.querySelectorAll('.season-btn').forEach(b => b.classList.remove('correct', 'wrong', 'hint'));
}

function getBtn(season) {
  return document.querySelector(`.season-btn[data-season="${season}"]`);
}

function selectSeason(season) {
  if (answered) return;
  if (season === QUESTIONS[curQ].season) registerCorrect(season);
  else registerWrong(season);
}

function registerCorrect(season) {
  answered = true;
  clearBtnStates();
  getBtn(season).classList.add('correct');
  score++;
  document.getElementById('score-val').textContent = score;
  window.speechSynthesis?.cancel();
  playClaps();
  showToast('⭐ Correct!', '#4CAF50');
  spawnSeasonConfetti(SEASONS[season].confetti);
  spawnEmojisBurst(SEASONS[season].emoji, getBtn(season));
  setTimeout(() => { curQ++; loadQuestion(); }, 3200);
}

function registerWrong(season) {
  if (answered) return;
  attempts++;
  const correctBtn = getBtn(QUESTIONS[curQ].season);

  if (attempts === 1) {
    getBtn(season).classList.add('wrong');
    play(sndWrong);
    showToast('❌ Try again!', '#f44336');
    setTimeout(() => {
      getBtn(season).classList.remove('wrong');
      correctBtn.classList.add('hint');
    }, 900);
  } else {
    answered = true;
    getBtn(season).classList.add('wrong');
    play(sndWrong);
    showToast('❌ Wrong!', '#f44336');
    setTimeout(() => {
      clearBtnStates();
      correctBtn.classList.add('correct');
      showToast('💡 Correct answer!', '#FF9800');
      setTimeout(() => { curQ++; loadQuestion(); }, 3000);
    }, 1000);
  }
}

function spawnEmojisBurst(emoji, el) {
  const rect = el.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  for (let i = 0; i < 10; i++) {
    const div = document.createElement('div');
    div.className = 'emoji-burst';
    div.textContent = emoji;
    const angle = (i / 10) * Math.PI * 2;
    const dist = 70 + Math.random() * 70;
    div.style.cssText = `left:${cx}px;top:${cy}px;--dx:${Math.cos(angle)*dist}px;--dy:${Math.sin(angle)*dist}px;`;
    document.body.appendChild(div);
    setTimeout(() => div.remove(), 1300);
  }
}

function spawnSeasonConfetti(colors) {
  for (let i = 0; i < 70; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'confetti';
      const sz = 6 + Math.random() * 9;
      const color = colors[Math.floor(Math.random() * colors.length)];
      el.style.cssText = `left:${Math.random()*100}vw;top:-12px;width:${sz}px;height:${sz}px;background:${color};border-radius:${Math.random()>0.4?'50%':'2px'};animation:cfFall ${1.4+Math.random()*1.8}s linear forwards;`;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 3500);
    }, i * 22);
  }
}
if (!document.querySelector('#cf-style')) {
  const s = document.createElement('style'); s.id = 'cf-style';
  s.textContent = `@keyframes cfFall{0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(105vh) rotate(540deg);opacity:0}}`;
  document.head.appendChild(s);
}

function startGame() {
  document.getElementById('intro-screen').style.display = 'none';
  document.getElementById('game-screen').style.display  = 'flex';
  QUESTIONS = shuffleNoConsecutive(ALL_QUESTIONS);
  curQ = 0; score = 0;
  loadQuestion();
}

function restartGame() {
  window.speechSynthesis?.cancel();
  document.getElementById('end-screen').style.display  = 'none';
  document.getElementById('game-screen').style.display = 'flex';
  QUESTIONS = shuffleNoConsecutive(ALL_QUESTIONS);
  curQ = 0; score = 0; attempts = 0; answered = false;
  loadQuestion();
}

let toastTimer = null;
function showToast(msg, bg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.style.background = bg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 1400);
}

function toggleMute() {
  muted = !muted;
  document.getElementById('mute-btn').textContent = muted ? '🔇' : '🔊';
  if (muted) { window.speechSynthesis?.cancel(); sndClaps.pause(); }
  else speak('Which season is this?');
}

function showEnd() {
  document.getElementById('game-screen').style.display = 'none';
  document.getElementById('end-screen').style.display  = 'flex';
  document.getElementById('final-score').textContent   = score;
  document.getElementById('end-stars').textContent = score >= 7 ? '⭐⭐⭐' : score >= 5 ? '⭐⭐' : '⭐';
  window.speechSynthesis?.cancel();
  playClaps();
  spawnSeasonConfetti(['#FFD700','#FF6B6B','#4CAF50','#2196F3','#FF9800','#AB47BC']);
  setTimeout(() => spawnSeasonConfetti(['#FFD700','#4FC3F7','#A5D6A7','#F48FB1']), 800);
}
</script>
</body>
</html>
