<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Missing Numbers · LY3</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', 'Trebuchet MS', Arial, sans-serif;
      background: linear-gradient(135deg, #fce4ec 0%, #e8f5e9 50%, #e3f2fd 100%);
      height: 100vh; height: 100dvh;
      display: flex; align-items: stretch; justify-content: center;
      overflow: hidden; user-select: none; -webkit-user-select: none;
    }

    /* ── INTRO ── */
    #intro-screen {
      position: fixed; inset: 0;
      background: linear-gradient(160deg, #4a148c, #7b1fa2, #ab47bc);
      display: flex; align-items: center; justify-content: center;
      border: 5px solid #FFD700; z-index: 200; cursor: pointer;
    }
    #intro-logo { width: 220px; height: auto; filter: drop-shadow(0 6px 20px rgba(0,0,0,0.5)); animation: logoBounce 2s ease-in-out infinite; }
    @keyframes logoBounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }

    /* ── GAME SCREEN ── */
    #game-screen {
      display: none; flex-direction: column;
      width: 100%; max-width: 860px;
      height: 100%; padding: 14px 14px 80px; overflow-y: auto;
    }

    /* Header */
    .hdr {
      display: flex; align-items: center; justify-content: space-between;
      background: white; border-radius: 18px; padding: 10px 18px;
      margin-bottom: 10px; box-shadow: 0 4px 14px rgba(0,0,0,0.1); flex-shrink: 0;
    }
    .hdr-score { font-size: 1.2em; font-weight: bold; color: #4CAF50; min-width: 70px; }
    .hdr-title { font-size: clamp(0.75em,2.5vw,1em); color: #6a0dad; font-weight: bold; text-align: center; }
    .mute-btn { width: 38px; height: 38px; border: 2px solid #ddd; border-radius: 50%; background: white; font-size: 1.1em; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .mute-btn:hover { border-color: #aaa; }

    /* Progress */
    .progress-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; flex-shrink: 0; }
    .progress-label { font-size: 0.9em; color: #777; white-space: nowrap; }
    .progress-bar-wrap { flex: 1; height: 10px; background: #e0e0e0; border-radius: 5px; overflow: hidden; }
    .progress-bar-fill { height: 100%; border-radius: 5px; background: linear-gradient(90deg,#4CAF50,#8BC34A); transition: width 0.5s ease; }

    /* Instruction */
    .instruction {
      text-align: center; font-size: clamp(0.95em,3vw,1.15em);
      color: #333; font-weight: 700; margin-bottom: 10px;
      padding: 0 4px; flex-shrink: 0; line-height: 1.4;
    }

    /* Card */
    .q-card {
      background: white; border-radius: 24px; padding: 24px 16px;
      box-shadow: 0 6px 24px rgba(0,0,0,0.1);
      display: flex; flex-direction: column; align-items: center; gap: 24px;
      margin-top: auto; margin-bottom: auto; flex-shrink: 0;
    }

    /* ── TRAIN SCENE ── */
    .train-scene {
      width: 100%; overflow-x: auto; padding-bottom: 4px;
    }
    .train-row {
      display: flex; align-items: flex-end;
      min-width: max-content; padding: 0 6px;
      gap: 0;
    }

    /* Locomotive SVG */
    .loco-svg { width: 130px; height: 105px; flex-shrink: 0; display: block; }

    /* Coupling hook between cars */
    .hook {
      width: 14px; height: 6px;
      background: #555; border-radius: 2px;
      align-self: center; margin-bottom: 26px; flex-shrink: 0;
    }

    /* Carriage */
    .carriage { flex-shrink: 0; display: flex; flex-direction: column; align-items: center; }
    .car-roof {
      width: 90px; height: 8px;
      background: linear-gradient(90deg, #c0392b, #e74c3c, #c0392b);
      border-radius: 5px 5px 0 0;
    }
    .car-body {
      width: 90px; height: 62px;
      background: linear-gradient(180deg, #fd9644 0%, #e67e22 100%);
      border-left: 3px solid #c0392b; border-right: 3px solid #c0392b;
      display: flex; align-items: center; justify-content: center;
      position: relative; transition: background 0.3s;
    }
    .car-num {
      width: 58px; height: 42px;
      background: white; border-radius: 6px;
      border: 2px solid rgba(0,0,0,0.15);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.6em; font-weight: 800; color: #2d3436;
      transition: background 0.3s, color 0.3s;
    }
    .car-body.missing { background: linear-gradient(180deg, #dfe6e9, #b2bec3); }
    .car-body.missing .car-num {
      background: #f0f0f0; color: #999; border: 2px dashed #999;
      animation: missingPulse 1.4s ease-in-out infinite;
    }
    .car-body.correct { background: linear-gradient(180deg,#55efc4,#00b894); }
    .car-body.correct .car-num { background: #e8fff6; color: #00b894; }
    @keyframes missingPulse { 0%,100%{box-shadow:0 0 0 0 rgba(108,92,231,0.35)} 50%{box-shadow:0 0 0 8px rgba(108,92,231,0)} }
    .car-floor {
      width: 96px; height: 10px;
      background: #7f5500;
      border-radius: 0 0 4px 4px;
    }
    .car-truck {
      width: 86px; height: 12px;
      background: #444; border-radius: 3px; margin-top: 1px;
      display: flex; align-items: center; justify-content: space-around; padding: 0 10px;
    }
    .wheel {
      width: 20px; height: 20px;
      background: radial-gradient(circle at 35% 35%, #aaa, #1a1a1a);
      border-radius: 50%; border: 2px solid #111; margin-top: 5px;
    }

    /* Track */
    .track-strip {
      width: 100%; min-width: max-content;
      position: relative; height: 18px; padding: 0 6px;
    }
    .rail {
      position: absolute; left: 6px; right: 6px; height: 5px;
      background: linear-gradient(90deg,#8B6914,#D4AC0D,#8B6914);
      border-radius: 2px;
    }
    .rail.top { top: 0; }
    .rail.bot { bottom: 0; }
    .sleepers {
      display: flex; gap: 9px; position: absolute;
      top: -1px; bottom: -1px; left: 6px; right: 6px;
    }
    .sleeper { flex: 1; background: #6D4C41; border-radius: 2px; min-width: 14px; }

    /* ── CHOICES ── */
    .choices-label {
      font-size: 0.9em; color: #999; font-weight: 700; letter-spacing: 0.05em;
    }
    .choices-row {
      display: flex; gap: 16px; justify-content: center; width: 100%;
    }
    .choice-btn {
      width: 80px; height: 80px;
      background: linear-gradient(135deg, #6c5ce7, #a29bfe);
      border: 4px solid transparent; border-radius: 18px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.8em; font-weight: 800; color: white;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(108,92,231,0.35);
      transition: transform 0.1s, border-color 0.2s, box-shadow 0.2s;
    }
    .choice-btn:active { transform: scale(0.92); }
    .choice-btn.correct {
      border-color: #4CAF50; background: linear-gradient(135deg,#55efc4,#00b894);
      box-shadow: 0 0 0 5px #4CAF5040; animation: popCorrect 0.35s ease;
    }
    .choice-btn.wrong {
      border-color: #f44336; background: linear-gradient(135deg,#ff7675,#d63031);
      animation: shakeWrong 0.4s ease;
    }
    .choice-btn.hint {
      border-color: #FFD700; border-width: 4px;
      animation: pulseHint 1s ease-in-out infinite;
    }
    @keyframes popCorrect  { 0%{transform:scale(1)} 50%{transform:scale(1.1)} 100%{transform:scale(1)} }
    @keyframes shakeWrong  { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }
    @keyframes pulseHint   { 0%,100%{box-shadow:0 0 0 0 rgba(255,215,0,0.6)} 50%{box-shadow:0 0 0 12px rgba(255,215,0,0)} }

    /* Restart */
    .btn-restart {
      position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
      background: linear-gradient(135deg,#FF9800,#F44336);
      color: white; border: none; border-radius: 50px;
      padding: 14px 36px; font-size: 1.05em; font-family: inherit;
      font-weight: 800; cursor: pointer;
      box-shadow: 0 4px 16px rgba(244,67,54,0.4); z-index: 50; white-space: nowrap;
    }

    /* Toast */
    #toast {
      position: fixed; top: 20%; left: 50%;
      transform: translateX(-50%) scale(0);
      color: white; padding: 14px 28px; border-radius: 50px;
      font-size: 1.4em; font-weight: 800;
      box-shadow: 0 6px 24px rgba(0,0,0,0.25); z-index: 100;
      transition: transform 0.2s, opacity 0.2s;
      opacity: 0; pointer-events: none; white-space: nowrap;
    }
    #toast.show { transform: translateX(-50%) scale(1); opacity: 1; }

    /* Confetti */
    .confetti-piece {
      position: fixed; top: -10px; pointer-events: none; z-index: 999;
      animation: confettiFall linear forwards;
    }
    @keyframes confettiFall { 0%{transform:translateY(0) rotate(0deg);opacity:1} 100%{transform:translateY(110vh) rotate(720deg);opacity:0} }

    /* End screen */
    #end-screen {
      display: none; position: fixed; inset: 0;
      background: linear-gradient(160deg,#4a148c,#7b1fa2,#ab47bc);
      flex-direction: column; align-items: center; justify-content: center;
      gap: 18px; z-index: 150; padding: 30px;
    }
    .end-trophy { font-size: 4.5em; animation: trophySpin 1.5s ease-out; }
    @keyframes trophySpin { from{transform:rotate(-20deg) scale(0)} 60%{transform:rotate(10deg) scale(1.1)} to{transform:rotate(0deg) scale(1)} }
    .end-title { color: #FFD700; font-size: clamp(1.5em,5vw,2.2em); font-weight: bold; text-shadow: 0 3px 10px rgba(0,0,0,0.3); text-align: center; }
    .end-sub { color: rgba(255,255,255,0.9); font-size: 1.1em; text-align: center; }
    .end-score-box { background: rgba(255,255,255,0.15); border-radius: 16px; padding: 12px 28px; color: white; font-size: 1.4em; font-weight: bold; }
    .end-stars { font-size: 2.2em; letter-spacing: 4px; }
    .btn-play-again { background: #FFD700; color: #333; border: none; border-radius: 50px; padding: 14px 36px; font-size: 1.1em; font-weight: 800; font-family: inherit; cursor: pointer; box-shadow: 0 4px 16px rgba(255,215,0,0.5); }
    .btn-play-again:hover { transform: scale(1.05); }

    /* Responsive */
    @media (max-width: 768px) {
      #game-screen { padding: 10px 10px 76px; }
      .q-card { padding: 16px 10px; gap: 16px; }
      .loco-svg { width: 100px; height: 80px; }
      .car-roof { width: 72px; }
      .car-body { width: 72px; height: 52px; }
      .car-num { width: 46px; height: 34px; font-size: 1.3em; }
      .car-floor { width: 78px; }
      .car-truck { width: 68px; }
      .choice-btn { width: 70px; height: 70px; font-size: 1.6em; }
      .hdr-title { display: none; }
    }
    @media (max-width: 480px) {
      #game-screen { padding: 8px 8px 76px; }
      .q-card { padding: 12px 8px; gap: 12px; border-radius: 18px; }
      .loco-svg { width: 80px; height: 65px; }
      .car-roof { width: 60px; }
      .car-body { width: 60px; height: 44px; }
      .car-num { width: 38px; height: 28px; font-size: 1.1em; border-radius: 4px; }
      .car-floor { width: 66px; }
      .car-truck { width: 56px; }
      .wheel { width: 16px; height: 16px; }
      .hook { width: 10px; margin-bottom: 20px; }
      .choice-btn { width: 64px; height: 64px; font-size: 1.5em; border-radius: 14px; }
      .choices-row { gap: 12px; }
      .hdr-score { font-size: 1em; }
      .instruction { font-size: clamp(0.85em,3.5vw,1em); margin-bottom: 6px; }
    }
  </style>
</head>
<body>

<!-- ── INTRO ── -->
<div id="intro-screen" onclick="startGame()">
  <img id="intro-logo" src="Assets/innovinelogo.png" alt="Innovine">
</div>

<div id="toast"></div>

<!-- ── GAME ── -->
<div id="game-screen">
  <div class="hdr">
    <div class="hdr-score">⭐ <span id="score-val">0</span> / 8</div>
    <div class="hdr-title">Missing Numbers</div>
    <button class="mute-btn" id="mute-btn" onclick="toggleMute()">🔊</button>
  </div>

  <div class="progress-row">
    <span class="progress-label">Q <span id="q-num">1</span> / 8</span>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="prog-bar" style="width:0%"></div>
    </div>
  </div>

  <div class="instruction" id="instruction-txt"></div>

  <div class="q-card">
    <!-- Train -->
    <div class="train-scene" id="train-scene"></div>

    <!-- Number choices -->
    <div class="choices-label">Pick the missing number</div>
    <div class="choices-row" id="choices-row"></div>
  </div>

  <button class="btn-restart" onclick="restartGame()">🔄 &nbsp;Restart</button>
</div>

<!-- ── END ── -->
<div id="end-screen">
  <div class="end-trophy">🏆</div>
  <div class="end-title">You have done a great job!</div>
  <div class="end-sub">You completed all 8 questions!</div>
  <div class="end-score-box">Score: &nbsp;<span id="final-score">0</span> / 8</div>
  <div class="end-stars" id="end-stars"></div>
  <button class="btn-play-again" onclick="restartGame()">▶ &nbsp;Play Again</button>
</div>

<script>
/* sequence: full list of 4 numbers; missingIdx: which position is hidden (0-based) */
const QUESTIONS = [
  { sequence: [1,  2,  3,  4],  missingIdx: 1, choices: [2,  5,  7],  text: 'What is the missing number? 1, ?, 3, 4' },
  { sequence: [4,  5,  6,  7],  missingIdx: 2, choices: [3,  6,  9],  text: 'What is the missing number? 4, 5, ?, 7' },
  { sequence: [8,  9,  10, 11], missingIdx: 3, choices: [4,  11, 13], text: 'What is the missing number? 8, 9, 10, ?' },
  { sequence: [2,  3,  4,  5],  missingIdx: 1, choices: [3,  6,  8],  text: 'What is the missing number? 2, ?, 4, 5' },
  { sequence: [6,  7,  8,  9],  missingIdx: 2, choices: [1,  5,  8],  text: 'What is the missing number? 6, 7, ?, 9' },
  { sequence: [10, 11, 12, 13], missingIdx: 0, choices: [7,  10, 14], text: 'What is the missing number? ?, 11, 12, 13' },
  { sequence: [3,  4,  5,  6],  missingIdx: 3, choices: [2,  6,  9],  text: 'What is the missing number? 3, 4, 5, ?' },
  { sequence: [7,  8,  9,  10], missingIdx: 1, choices: [4,  8,  12], text: 'What is the missing number? 7, ?, 9, 10' },
];

const sndWrong = new Audio('Assets/wrong.mp3');
const sndClaps = new Audio('Assets/free_claps.mp3');

let curQ = 0, score = 0, muted = false, answered = false, attempts = 0;

/* ── AUDIO ── */
function getVoice() {
  const voices = window.speechSynthesis.getVoices();
  return voices.find(v => v.lang.startsWith('en') && !v.name.includes('Google'))
      || voices.find(v => v.lang.startsWith('en')) || voices[0];
}

function speakSequence(q) {
  sndClaps.pause(); sndClaps.currentTime = 0;
  if (!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  if (muted) return;
  setTimeout(() => {
    if (muted) return;
    const v = getVoice();
    const texts = [
      'What is the missing number',
      ...q.sequence.map((n, i) => i === q.missingIdx ? 'blank' : String(n))
    ];
    texts.forEach(text => {
      const u = new SpeechSynthesisUtterance(text);
      u.lang = 'en-US'; u.rate = 0.7; u.pitch = 1.0;
      if (v) u.voice = v;
      window.speechSynthesis.speak(u);
    });
  }, 150);
}
window.speechSynthesis.getVoices();
window.speechSynthesis.addEventListener('voiceschanged', () => window.speechSynthesis.getVoices());

function playClaps() {
  if (muted) return;
  sndClaps.currentTime = 0; sndClaps.play().catch(() => {});
  setTimeout(() => { sndClaps.pause(); sndClaps.currentTime = 0; }, 3000);
}

/* ── BUILD TRAIN ── */
function buildTrain(sequence, missingIdx) {
  const scene = document.getElementById('train-scene');
  scene.innerHTML = '';

  const row = document.createElement('div');
  row.className = 'train-row';

  /* SVG Locomotive */
  const loco = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  loco.setAttribute('viewBox', '0 0 130 105');
  loco.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
  loco.classList.add('loco-svg');
  loco.innerHTML = `
    <rect x="14" y="22" width="16" height="26" rx="3" fill="#4a148c"/>
    <rect x="10" y="17" width="24" height="9" rx="4" fill="#6a1b9a"/>
    <circle cx="22" cy="11" r="5" fill="rgba(255,255,255,0.75)"/>
    <circle cx="29" cy="7" r="4" fill="rgba(255,255,255,0.55)"/>
    <circle cx="18" cy="6" r="3.5" fill="rgba(255,255,255,0.4)"/>
    <rect x="6" y="44" width="104" height="34" rx="10" fill="#7b1fa2"/>
    <rect x="12" y="50" width="88" height="10" rx="5" fill="rgba(255,255,255,0.22)"/>
    <ellipse cx="50" cy="44" rx="14" ry="7" fill="#9c27b0"/>
    <rect x="84" y="26" width="36" height="52" rx="6" fill="#6a1b9a"/>
    <rect x="80" y="21" width="42" height="9" rx="4" fill="#4a148c"/>
    <rect x="90" y="33" width="20" height="15" rx="4" fill="#B3E5FC"/>
    <line x1="100" y1="33" x2="100" y2="48" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
    <rect x="0" y="73" width="8" height="6" rx="1" fill="#444"/>
    <circle cx="7" cy="62" r="5" fill="#FFD700"/>
    <circle cx="7" cy="62" r="3" fill="#FFFDE7"/>
    <rect x="6" y="75" width="102" height="6" rx="3" fill="#4a148c"/>
    <circle cx="32" cy="86" r="15" fill="#1a1a1a" stroke="#555" stroke-width="1.5"/>
    <circle cx="32" cy="86" r="10" fill="#2d2d2d"/>
    <circle cx="32" cy="86" r="4" fill="#888"/>
    <line x1="32" y1="75" x2="32" y2="97" stroke="#555" stroke-width="2"/>
    <line x1="21" y1="86" x2="43" y2="86" stroke="#555" stroke-width="2"/>
    <line x1="24" y1="78" x2="40" y2="94" stroke="#555" stroke-width="1.5"/>
    <line x1="40" y1="78" x2="24" y2="94" stroke="#555" stroke-width="1.5"/>
    <circle cx="14" cy="90" r="9" fill="#1a1a1a" stroke="#555" stroke-width="1"/>
    <circle cx="14" cy="90" r="5" fill="#2d2d2d"/>
    <circle cx="14" cy="90" r="2" fill="#888"/>
    <circle cx="98" cy="88" r="11" fill="#1a1a1a" stroke="#555" stroke-width="1"/>
    <circle cx="98" cy="88" r="7" fill="#2d2d2d"/>
    <circle cx="98" cy="88" r="3" fill="#888"/>
    <rect x="32" y="82" width="66" height="4" rx="2" fill="#555"/>
    <rect x="6" y="44" width="104" height="3" rx="1.5" fill="rgba(255,215,0,0.5)"/>
  `;
  row.appendChild(loco);

  /* Carriages */
  sequence.forEach((num, i) => {
    const hook = document.createElement('div');
    hook.className = 'hook';
    row.appendChild(hook);

    const isMissing = (i === missingIdx);
    const carriage = document.createElement('div');
    carriage.className = 'carriage';
    carriage.innerHTML = `
      <div class="car-roof"></div>
      <div class="car-body${isMissing ? ' missing' : ''}" id="car-${i}">
        <div class="car-num">${isMissing ? '?' : num}</div>
      </div>
      <div class="car-floor"></div>
      <div class="car-truck">
        <div class="wheel"></div>
        <div class="wheel"></div>
      </div>
    `;
    row.appendChild(carriage);
  });

  scene.appendChild(row);

  /* Track */
  const track = document.createElement('div');
  track.className = 'track-strip';
  track.innerHTML = `
    <div class="sleepers">${Array(22).fill('<div class="sleeper"></div>').join('')}</div>
    <div class="rail top"></div>
    <div class="rail bot"></div>
  `;
  scene.appendChild(track);
}

/* ── BUILD CHOICES ── */
function buildChoices(choices) {
  const row = document.getElementById('choices-row');
  row.innerHTML = '';
  /* Shuffle choices */
  const shuffled = [...choices].sort(() => Math.random() - 0.5);
  shuffled.forEach(n => {
    const btn = document.createElement('div');
    btn.className = 'choice-btn';
    btn.dataset.val = n;
    btn.textContent = n;
    btn.onclick = () => selectChoice(n);
    row.appendChild(btn);
  });
}

function getChoiceBtn(val) { return document.querySelector('.choice-btn[data-val="' + val + '"]'); }
function clearChoiceStates() { document.querySelectorAll('.choice-btn').forEach(b => b.classList.remove('correct','wrong','hint')); }

/* ── GAME FLOW ── */
function startGame() {
  document.getElementById('intro-screen').style.display = 'none';
  document.getElementById('game-screen').style.display  = 'flex';
  curQ = 0; score = 0;
  loadQuestion();
}

function loadQuestion() {
  if (curQ >= 8) { showEnd(); return; }
  answered = false; attempts = 0;

  const q = QUESTIONS[curQ];
  document.getElementById('q-num').textContent     = curQ + 1;
  document.getElementById('score-val').textContent = score;
  document.getElementById('prog-bar').style.width  = (curQ / 8 * 100) + '%';
  document.getElementById('instruction-txt').textContent = q.text;

  buildTrain(q.sequence, q.missingIdx);
  buildChoices(q.choices);
  speakSequence(q);
}

function selectChoice(val) {
  if (answered) return;
  const q = QUESTIONS[curQ];
  const correct = q.sequence[q.missingIdx];
  if (val === correct) registerCorrect();
  else registerWrong(val);
}

function registerCorrect() {
  if (answered) return;
  answered = true;
  score++;
  document.getElementById('score-val').textContent = score;

  const q = QUESTIONS[curQ];
  const correct = q.sequence[q.missingIdx];

  /* Fill the missing car with the correct number */
  const car = document.getElementById('car-' + q.missingIdx);
  car.querySelector('.car-num').textContent = correct;
  car.classList.remove('missing');
  car.classList.add('correct');

  clearChoiceStates();
  getChoiceBtn(correct).classList.add('correct');

  window.speechSynthesis?.cancel();
  playClaps();
  showToast('⭐ Correct!', '#4CAF50');
  spawnConfetti();
  setTimeout(nextQuestion, 3200);
}

function registerWrong(val) {
  if (answered) return;
  attempts++;

  if (attempts === 1) {
    sndWrong.currentTime = 0; if (!muted) sndWrong.play().catch(() => {});
    showToast('❌ Try again!', '#f44336');
    const wrongBtn = getChoiceBtn(val);
    wrongBtn.classList.add('wrong');
    const correctVal = QUESTIONS[curQ].sequence[QUESTIONS[curQ].missingIdx];
    getChoiceBtn(correctVal).classList.add('hint');
    setTimeout(() => { wrongBtn.classList.remove('wrong'); hideToast(); }, 900);
  } else {
    answered = true;
    sndWrong.currentTime = 0; if (!muted) sndWrong.play().catch(() => {});
    showToast('❌ Wrong!', '#f44336');
    clearChoiceStates();
    getChoiceBtn(val).classList.add('wrong');

    const q = QUESTIONS[curQ];
    const correctVal = q.sequence[q.missingIdx];
    setTimeout(() => {
      showToast('💡 Correct answer!', '#FF9800');
      getChoiceBtn(val).classList.remove('wrong');
      getChoiceBtn(correctVal).classList.add('correct');
      /* Also fill the train car */
      const car = document.getElementById('car-' + q.missingIdx);
      car.querySelector('.car-num').textContent = correctVal;
      car.classList.remove('missing');
      car.classList.add('correct');
      setTimeout(nextQuestion, 3000);
    }, 1000);
  }
}

function nextQuestion() { clearChoiceStates(); curQ++; loadQuestion(); }

/* ── TOAST ── */
function showToast(msg, color) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.background = color;
  t.classList.add('show');
  setTimeout(hideToast, 1800);
}
function hideToast() { document.getElementById('toast').classList.remove('show'); }

/* ── CONFETTI ── */
function spawnConfetti() {
  const colors = ['#FF6B6B','#FFD93D','#6BCB77','#4D96FF','#FF922B','#cc5de8','#ff6b81'];
  for (let i = 0; i < 60; i++) {
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    p.style.cssText = `
      left:${Math.random()*100}vw;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      width:${6+Math.random()*8}px; height:${6+Math.random()*8}px;
      border-radius:${Math.random()>0.5?'50%':'2px'};
      animation-duration:${1.5+Math.random()*2}s;
      animation-delay:${Math.random()*0.8}s;
    `;
    document.body.appendChild(p);
    p.addEventListener('animationend', () => p.remove());
  }
}

/* ── MUTE ── */
function toggleMute() {
  muted = !muted;
  document.getElementById('mute-btn').textContent = muted ? '🔇' : '🔊';
  if (muted) { window.speechSynthesis?.cancel(); sndClaps.pause(); }
  else if (curQ < 8) { speakSequence(QUESTIONS[curQ]); }
}

/* ── END ── */
function showEnd() {
  document.getElementById('game-screen').style.display = 'none';
  document.getElementById('end-screen').style.display  = 'flex';
  document.getElementById('final-score').textContent   = score;
  document.getElementById('end-stars').textContent = score >= 7 ? '⭐⭐⭐' : score >= 5 ? '⭐⭐' : '⭐';
  window.speechSynthesis?.cancel();
  playClaps(); spawnConfetti();
  setTimeout(spawnConfetti, 800);
}

function restartGame() {
  clearChoiceStates();
  window.speechSynthesis?.cancel();
  document.getElementById('end-screen').style.display  = 'none';
  document.getElementById('game-screen').style.display = 'flex';
  curQ = 0; score = 0; attempts = 0; answered = false;
  loadQuestion();
}
</script>
</body>
</html>
